# Adjustable classifier policy for scaffold changes. TRACKED — edit to tune how often the human (PM) is
# pulled in. The starting point is low-stakes precisely because it's adjustable.
#
# FORMAT: a plain DATA file — ONE glob pattern per line; `#` starts a comment; blank lines ignored.
# It is PARSED, never executed (classify.sh does not source it), so nothing here can run code or weaken
# the hardcoded protected floor in classify.sh. This list is ADDITIVE: every glob below is added to the
# floor's always-architectural set.
#
# A changed path matching ANY glob here => ARCHITECTURAL (needs the PM's design approval), no judgment.
# Fail-closed: architectural is the DEFAULT anyway; this just makes the high-blast-radius surfaces
# unconditional. Tune by adding/removing lines.
#
# (The constitution + .aar-ci/* + .githooks/* are ALSO in the non-configurable floor in classify.sh and
#  cannot be removed by editing this file; they are repeated here only for a complete, readable policy.)

CLAUDE.md
AGENTS.md
*/CLAUDE.md
*/AGENTS.md
plugins/*/skills/*/SKILL.md             # a skill's instructions ARE its behavior
plugins/*/skills/*/scripts/*            # a skill's code is its behavior
plugins/*/.claude-plugin/plugin.json    # the plugin contract/version
.claude-plugin/marketplace.json         # the discovery surface
.aar-ci/*                               # the CI policy itself (also in the floor)
.githooks/*                             # the secrets gate (also in the floor)
proposals/*                             # a design proposal is an architectural artifact
