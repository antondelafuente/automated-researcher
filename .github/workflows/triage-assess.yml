name: triage-assess

# GitHub-native SWE pipeline, triager leg v1.1 (automated-researcher#497, evolving the v1 batch design from
# #437/#414 without granting any new write powers — still assess-and-propose, zero label/body writes). Fixes
# three verified v1 defects:
#   1. v1 gathered open `needs-design` issues, but tickets are filed unlabeled in practice — a v1 run assessed
#      nothing. This leg is event-driven (`issues: [opened, reopened]`) and assesses the ONE triggering ticket
#      regardless of its labels, plus a scheduled backstop sweep (see below) that no longer filters by label.
#   2. A weekly batch mismatched the pipeline's own event-summoned-never-polling rule. Assessment now happens
#      per-ticket, within minutes of filing.
#   3. Scheduled runs failed silently since 2026-07-13: on a `schedule` event `github.actor` is the bare login
#      of whoever last modified this workflow file (no `[bot]` suffix for an App identity), so
#      openai/codex-action's `allow-bot-users` bypass (which requires `isBotActor()` — an actor ending in
#      `[bot]` — before it even looks at the allowlist) never engaged; execution fell through to a
#      collaborator-permission lookup for that bare login, which 404s (an App isn't a listed collaborator
#      under that form) and rejects the run. Root-caused by reading codex-action's own
#      `src/checkActorPermissions.ts` (pinned SHA below) rather than guessing. Fixed by passing the SAME
#      dynamic actor value via `allow-users` instead: it matches the actor string directly, with no
#      bot-suffix precondition, so it engages correctly under every trigger type's representation of the
#      actor (bare login on `schedule`, `<slug>[bot]` on `issues`/human `workflow_dispatch`) with one line, no
#      per-event branching needed. A failed run is now also VISIBLE (see post-failure-notice) — silent
#      failure is what hid this defect for five days.
#
# Both blind assessments (Fable, Sol — same cross-family split review-on-pr.yml already uses) and the sighted
# adjudication's full proposal (verdicts + proposed body edits + proposed wave composition) are archived as
# run artifacts for auditability, same as v1. Output moves ONTO the ticket now instead of a digest-only
# comment on #414 (#497 design item 2): each assessed ticket gets exactly one idempotency-marked comment
# (`<!-- TRIAGE-ASSESSMENT-VERDICT: ... -->` as its first line; a re-run for the same ticket — a manual
# `workflow_dispatch` re-request, or a `reopened` re-trigger — edits that comment in place rather than
# stacking a new one) carrying both blind verdicts, the sighted verdict, reasoning, and the proposed body
# edit as an explicit replacement block. All three model outputs have their returned ticket set asserted to
# exactly match the gathered set (.github/triage/validate_coverage.sh) immediately after parsing; on any
# mismatch the run fails closed at that point, so a corrupt blind pass never even reaches adjudication (same
# invariant v1 established, PR #456). The adjudication output additionally gets the same semantic
# wave-assignment check (--check-wave).
#
# The weekly `schedule` leg is now a BACKSTOP SWEEP (#497 design item 3), not the primary path: it gathers
# open issues that carry NO disposition label (`ready`/`blocked`/`parked`/`other`) or escalation label
# (`needs-human`/`needs-senior-engineer`) at all, and NO assessment comment yet (event-missed stragglers —
# including, on its first run, today's entire unlabeled backlog; tightened by #518 to exclude every
# dispositioned label, not just `ready`/`needs-*` — a dispositioned ticket has already been decided, and the
# sweep exists only for UNDECIDED stragglers). Per PR #501
# review round (2026-07-19), the sweep does NOT assess these stragglers itself: it only dispatches, for each
# one, the SAME per-issue path a single `issues` event would take (`workflow_dispatch` with `issue_number`
# set), using the minted claude-engineer App token so the dispatched run's own actor is
# `claude-code-engineer[bot]` — an allowlisted identity, so that run's own authorization gate passes. Each
# dispatched run joins ITS issue's own `triage-assess-<n>` concurrency group, so the
# exactly-one-assessment-comment invariant is enforced by concurrency (structural), not by the sweep racing
# a non-atomic find-then-create against a concurrent event-driven run (P0-3, the fix for a real duplicate-
# comment race the prior find-then-create shape had). The sweep keeps only three steps: gather stragglers,
# dispatch each, then rebuild the ROLLUP digest comment on #414 — every open, still-undispositioned issue
# that already carries an assessment comment (from this run's dispatches, if they've already landed, or any
# earlier run), i.e. "awaiting researcher action". Because dispatched runs are async, the rollup rebuild can
# run before some of this sweep's OWN dispatches finish — it reads assessments off the issues directly
# (never assumed from the dispatch calls succeeding) and says so in the posted comment, so a lagging
# just-dispatched ticket reads as expected async behavior, not a bug. The rollup is posted EVERY sweep run,
# never skipped: an empty awaiting-action set edits the same idempotent comment to an explicit empty-state
# body instead of leaving a stale table up (P0-2 — the comment is the researcher's one anchor link, so it is
# never deleted either). A table that would exceed a safe comment-size budget is capped with an explicit
# "N more — see the Actions run" overflow line rather than posted unbounded (P1; the prior v1 implementation
# instead chunked into sequential "part k/N" comments — not reusable here since v1.1's rollup is a single
# idempotently-edited comment, not a fresh one every run). `workflow_dispatch` accepts an optional
# `issue_number`: given, it re-runs the single-ticket path against that issue's current state (a manual
# re-request, or the sweep's own dispatch); omitted, it runs the sweep.
#
# Every place this workflow FINDS an assessment marker comment — sweep skip-detection, rollup verdict
# extraction, and both idempotent-upsert lookups (the per-ticket comment and the #414 rollup comment) — filters
# by comment AUTHOR (canonicalized to `claude-code-engineer[bot]`, handling both login representations the
# GitHub API uses — automated-researcher#381's dual-representation precedent), never by body-prefix match
# alone (P0-1). This repo is public: without the author filter, an outside commenter could post a
# marker-shaped comment that fools the sweep into skipping real assessment, feeds a forged verdict into the
# researcher-facing rollup, or gets its own comment silently overwritten by a later PATCH meant for our own
# comment.
#
# Every entry path is actor-gated to the same allowlist every other actuator in this pipeline uses
# (researcher + the two engineer bots, both App-identity representations — automated-researcher#381's
# dual-representation precedent). This repo is public (AGENTS.md), so `issues: opened/reopened` fires on ANY
# GitHub user's issue — without this gate, an outside filer could trigger paid model calls and a bot-authored
# comment on their own issue for free (openai/codex-action's own docs/security.md warns about exactly this
# class of abuse). An issue filed by anyone else still gets picked up by the backstop sweep, just on the
# sweep's own (non-attacker-controlled) cadence instead of within minutes.
#
# Concurrency is per-issue (#497 design item 7): bulk filings assess in parallel, keyed by issue number; the
# sweep uses its own single group so it doesn't race a concurrent sweep, but never blocks on (or is blocked
# by) any per-issue run — including the ones it dispatches itself.
#
# See AGENTS.md "GitHub-native SWE pipeline (BYOK)" for the trust model, and .github/triage/RUBRIC.md for the
# rubric every assessment/adjudication pass applies.
#
# Capability reduction for non-allowlisted-author tickets (automated-researcher#523): this pipeline's whole
# job is to READ the filed ticket's own text, so an author-filtered snapshot (the #517/PR #520 shepherd-feed
# pattern) can't exclude the very content being assessed here -- the boundary has to be capability-side
# instead. `gather`'s single-ticket packet-build step resolves the ONE ticket's own author (canonicalized the
# same way every other actor check in this repo is, automated-researcher#381) against this pipeline's usual
# allowlist and outputs `trusted_author`. Every model-bearing job (blind-assess-fable, blind-assess-sol,
# adjudicate) branches on it:
#   - trusted_author == true (the researcher or one of the two engineer bots filed/reopened it): unchanged
#     from v1.1 -- full checkout, Read (blind-assess) / Read+Grep+Glob (adjudicate) tool access, so the
#     adjudicator can still check candidate DO tickets' file footprints for wave batching.
#   - trusted_author == false (anyone else, on this public repo): NO checkout of this repository and NO
#     tools beyond producing the structured verdict (Claude: `--tools ""`; codex-action: no checkout step at
#     all, so there is nothing for its read-only sandbox to read). The rubric and the one ticket packet are
#     embedded directly into the prompt TEXT instead, assembled by `gather` (which already has its own
#     trusted checkout for exactly this, and never touches the ticket's own attacker-controlled text while
#     doing so) and wrapped in explicit `<<<UNTRUSTED_TICKET_DATA>>>` delimiters with an instruction that the
#     content is DATA to assess, never instructions -- defense-in-depth on top of the capability reduction,
#     never a substitute for it (see `.github/prompts/*-untrusted.md`). The adjudicator's only genuine use of
#     repo access is RUBRIC.md's file-disjoint wave-batching check; without it, a capability-reduced DO
#     verdict cannot be compared against any other ticket's footprint, so the workflow itself (not the
#     model) mechanically overrides its wave to this ticket's own issue number -- globally unique by
#     construction, so it can never accidentally collide with, and therefore never silently batches with,
#     any other ticket's wave (the wave rule's fail-safe direction is to serialize, per RUBRIC.md).
#   Every multiline value assembled from ticket-filer-controlled text and passed through a `GITHUB_OUTPUT`
#   heredoc uses a freshly random delimiter (`PROMPT_EOF_$(openssl rand -hex 16)`) -- GitHub's own documented
#   mitigation for the delimiter-collision injection class; the fixed `PROMPT_EOF` delimiter the
#   trusted-author path still uses is safe there only because that path's prompt is 100% static file content,
#   never ticket-filer text. Every free-text field a model can populate from ticket-filer-controlled input
#   (blind-assessment reasoning, adjudication notes/proposed_body_edit) has any `@handle`-shaped substring
#   neutralized (wrapped in an inline code span, same technique as review-on-pr.yml's
#   automated-researcher#502 precedent) before it enters an App-authored comment -- an App-authored comment
#   passes exactly the author filters other actuators in this pipeline trust by author
#   (agentic-engineering#56's escalation-mention sanitization precedent).

on:
  issues:
    types: [opened, reopened]
  schedule:
    # Weekly backstop; cadence is not load-bearing (issue #437 acceptance) since the event path now handles
    # same-day assessment and this leg exists only to catch stragglers.
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Assess this one issue (its current state). Leave blank to run the backstop sweep instead."
        required: false
        type: number

concurrency:
  # Per-issue group so bulk filings assess in parallel without racing each other; the sweep (no issue number
  # in play) gets its own fixed group instead of colliding with — or blocking on — any per-issue run.
  group: triage-assess-${{ github.event.issue.number || github.event.inputs.issue_number || 'sweep' }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read

env:
  # Fixed rollup destination (issue #437's design, reused by #497's sweep leg).
  DIGEST_ISSUE: 414
  # First line of every posted assessment comment — used identically to detect "already assessed" (gather's
  # straggler exclusion and the rollup's awaiting-action scan) and to find-or-edit the comment in post-results.
  # Keep this literal in sync across all three uses if it's ever changed.
  ASSESSMENT_MARKER_PREFIX: "<!-- TRIAGE-ASSESSMENT-VERDICT:"
  # Same allowlist every other actuator in this pipeline uses (space-separated, for canonical-login.sh's
  # shell-loop comparison idiom — same form as implement-on-ready.yml's own ALLOWLIST). Used by `gather`
  # (#523) to classify a single ticket's OWN author as trusted/untrusted for capability reduction — a
  # distinct check from the job-level `if:` actor gates above, which authorize who can trigger this workflow
  # at all, not who filed the ticket being assessed.
  ALLOWLIST: "antondelafuente claude-code-engineer[bot] codex-engineer[bot]"

jobs:
  gather:
    name: gather
    runs-on: ubuntu-latest
    # Coarse pre-filter (mirrors every other actuator's job-level `if:` in this pipeline). `schedule` has no
    # meaningful actor and is always allowed (it's not attacker-controlled timing). `issues` is gated on the
    # EVENT SENDER (spoof-resistant — the event payload field, not a guessable title/label match) so an
    # outside actor on this public repo can't trigger a privileged run by opening OR reopening an issue;
    # their ticket still reaches the backstop sweep. Deliberately `sender`, not `issue.user` (the original
    # filer): for `reopened` those can differ (an allowlisted person reopening someone else's old issue for
    # reassessment must still work), and `sender` is the correct "who caused this event" check either way —
    # for `opened` it's the same identity as the filer. `workflow_dispatch` is gated on the triggering actor,
    # same allowlist as every other manual lever in this pipeline.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'issues' &&
        contains(fromJSON('["antondelafuente","claude-code-engineer[bot]","codex-engineer[bot]","app/claude-code-engineer","app/codex-engineer"]'), github.event.sender.login)) ||
      (github.event_name == 'workflow_dispatch' &&
        contains(fromJSON('["antondelafuente","claude-code-engineer[bot]","codex-engineer[bot]","app/claude-code-engineer","app/codex-engineer"]'), github.actor))
    outputs:
      mode: ${{ steps.build.outputs.mode }}
      issue_number: ${{ steps.build.outputs.issue_number }}
      ticket_count: ${{ steps.build.outputs.ticket_count }}
      stragglers: ${{ steps.build.outputs.stragglers }}
      # #523: single-mode only — whether the ONE gathered ticket's own author is on this pipeline's trusted
      # allowlist. Every model-bearing downstream job branches on this to decide checkout + tool access.
      trusted_author: ${{ steps.build.outputs.trusted_author }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      # Single-ticket mode (an `issues` event, or `workflow_dispatch` with issue_number set) builds a one-entry
      # packet for exactly the triggering/requested issue, unconditionally — its current labels never gate
      # whether it gets assessed. `opened` is unconditional because a fresh filing is undecided by definition;
      # `reopened` is ALSO left unconditional, by explicit decision (automated-researcher#518): the `gather`
      # job's actor gate above already restricts who can fire a `reopened` event that reaches this far
      # (researcher + the two engineer bots), so a reopen from that allowlist reads as an intentional
      # reassessment request, not a stragglers-sweep case — it does not need the sweep's no-disposition
      # predicate applied to it.
      #
      # Sweep mode (schedule, or workflow_dispatch with no issue_number) no longer builds assessment packets
      # at all (P0-3, PR #501 review round): it only needs the NUMBERS of open issues that carry no
      # disposition label (`ready`/`blocked`/`parked`/`other`) or escalation label (`needs-human`/
      # `needs-senior-engineer`) at all, and no assessment comment yet (the event-missed-stragglers predicate,
      # #497 design item 3, tightened by #518). Lifecycle rule this predicate implements: a dispositioned or
      # escalated ticket has already been DECIDED — the sweep exists only to catch UNDECIDED stragglers, so it
      # must exclude every disposition/escalation label, not just `ready`/`needs-*` (mirrors the
      # sweep-dispatch-rollup job's own awaiting-action filter below — the two now apply the identical
      # "dispositioned = decided" rule instead of disagreeing). Those numbers are dispatched (see
      # sweep-dispatch-rollup below), one per-issue `workflow_dispatch` run each, instead of being assessed
      # inline.
      - name: Build ticket packet(s) / gather stragglers
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_INPUT: ${{ github.event.inputs.issue_number }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "$EVENT_NAME" = "issues" ]; then
            MODE=single
            ISSUE_NUMBER="$EVENT_ISSUE_NUMBER"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_ISSUE_INPUT" ]; then
            MODE=single
            ISSUE_NUMBER="$DISPATCH_ISSUE_INPUT"
          else
            MODE=sweep
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          [ "$MODE" = single ] && echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "$MODE" = single ]; then
            if ! gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
                --json number,title,body,labels,createdAt,comments,author > /tmp/raw_issue.json; then
              echo "::error::gh issue view $ISSUE_NUMBER failed"
              exit 1
            fi
            jq -s '.' /tmp/raw_issue.json > /tmp/candidates.json

            jq --arg now "$NOW" '
              def age_days(created):
                (($now | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) - (created | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)) / 86400 | floor;
              def refs(text; self):
                ([text | scan("#[0-9]+")] | map(ltrimstr("#") | tonumber) | unique) - [self];
              {
                generated_at: $now,
                tickets: [ .[] | {
                  number,
                  title,
                  body: (.body // ""),
                  labels: [.labels[].name],
                  created_at: .createdAt,
                  age_days: age_days(.createdAt),
                  comments: [ .comments[] | {author: .author.login, created_at: .createdAt, body: (.body // "")} ],
                  referenced_issues: refs( ((.body // "") + "\n" + ([.comments[].body // ""] | join("\n"))); .number ),
                  author: (.author.login // "")
                } ]
              }
            ' /tmp/candidates.json > triage-packets.json

            # #523: embed the (repo-trusted, never ticket-controlled) rubric + capability-reduced prompt
            # preambles + the coverage validator script directly into the packets artifact here, while this
            # job still has its own checkout — so the model-bearing blind-assess/adjudicate jobs never need a
            # checkout of their own at all for an untrusted-author ticket (see below). #526 round-2 review
            # (P0): a job-local sparse `actions/checkout` (the round-1 fix for the missing-validator P0)
            # still materializes the FULL `.git` object database, not just the sparse worktree cone — a
            # shell-capable model (codex-action's read-only sandbox included) can still `git show
            # HEAD:<path>` any file in the repo regardless of what's checked out to the working tree. Writing
            # the script straight from this artifact, instead of via any `actions/checkout` call, grants no
            # git history at all in the untrusted-author jobs.
            rubric_content=$(cat .github/triage/RUBRIC.md)
            blind_untrusted_preamble=$(cat .github/prompts/triage-blind-assess-untrusted.md)
            adjudicate_untrusted_preamble=$(cat .github/prompts/triage-adjudicate-untrusted.md)
            validate_coverage_script=$(cat .github/triage/validate_coverage.sh)
            jq --arg rubric "$rubric_content" \
               --arg bpre "$blind_untrusted_preamble" \
               --arg apre "$adjudicate_untrusted_preamble" \
               --arg vscript "$validate_coverage_script" \
               '. + {rubric: $rubric, blind_assess_untrusted_preamble: $bpre, adjudicate_untrusted_preamble: $apre, validate_coverage_script: $vscript}' \
               triage-packets.json > /tmp/packets_ext.json
            mv /tmp/packets_ext.json triage-packets.json

            # #523: classify the ticket as trusted/untrusted for capability reduction. automated-researcher#381:
            # canonicalize before comparing — `gh issue view --json author` returns the CLI/GraphQL "app/<slug>"
            # form. #526 round-2 review (P0): trust is the AND of the ticket's OWN author (not this run's
            # actor/sender, which the sweep dispatch always sets to the allowlisted App identity regardless of
            # who actually filed the ticket) AND every comment author — on this public repo, anyone can comment
            # on anyone's issue, so an allowlisted-author ticket's embedded comment thread can still carry
            # attacker-controlled text; without this, that text would reach the full-checkout,
            # Read/Grep/Glob-capable trusted path exactly like an untrusted issue body would. One
            # non-allowlisted login anywhere in the set forces the whole ticket down the capability-reduced
            # path (fail-closed, per AGENTS.md's scale principle) rather than trying to filter per-comment.
            source "$GITHUB_WORKSPACE/.github/scripts/canonical-login.sh"
            author_login=$(jq -r '.tickets[0].author' triage-packets.json)
            mapfile -t comment_logins < <(jq -r '.tickets[0].comments[].author' triage-packets.json)
            trusted_author=true
            for login in "$author_login" "${comment_logins[@]}"; do
              login_canon=$(canonical_login "$login" 2>/dev/null || echo "")
              matched=false
              # Explicit if/then (not a `&&`-chained one-liner): under `set -e`, a bare failing `[ ... ]` in a
              # `&&` list that never reaches `matched=true` would abort this whole step, not just skip the
              # loop body.
              if [ -n "$login_canon" ]; then
                for a in $ALLOWLIST; do
                  if [ "$(canonical_login "$a")" = "$login_canon" ]; then
                    matched=true
                  fi
                done
              fi
              if [ "$matched" != true ]; then
                trusted_author=false
              fi
            done
            echo "ticket #$ISSUE_NUMBER author=$author_login comment_authors=${comment_logins[*]:-none} trusted_author=$trusted_author"
            echo "trusted_author=$trusted_author" >> "$GITHUB_OUTPUT"

            ticket_count=$(jq '.tickets | length' triage-packets.json)
            echo "mode=$MODE gathered $ticket_count ticket(s)"
            echo "ticket_count=$ticket_count" >> "$GITHUB_OUTPUT"
          else
            if ! gh issue list --repo "$REPO" --state open \
                --json number,title,labels,comments --limit 300 > /tmp/raw_issues.json; then
              echo "::error::gh issue list failed"
              exit 1
            fi
            # No pagination in v1 (issue #437 acceptance) — a silently truncated fetch must not pass
            # coverage validation against itself, so fail loudly instead of masking it.
            raw_count=$(jq 'length' /tmp/raw_issues.json)
            if [ "$raw_count" -eq 300 ]; then
              echo "::error::gh issue list returned exactly 300 open issue(s) — backlog exceeds gather limit — raise it"
              exit 1
            fi
            # Author-filtered marker match (P0-1, PR #501 review round): an outsider's marker-shaped comment
            # must not count as "already assessed" — only a comment actually authored by the claude engineer
            # App identity, under either login representation the GitHub API uses (#381 precedent), does.
            # -c: GITHUB_OUTPUT values must be single-line; the default pretty-printed array would corrupt it.
            stragglers=$(jq -c --arg marker "$ASSESSMENT_MARKER_PREFIX" '
              def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
              [ .[] | select(
                  (.labels | map(.name) | any(. == "ready" or . == "blocked" or . == "parked" or . == "other"
                    or . == "needs-human" or . == "needs-senior-engineer")) | not
                ) | select(
                  ( [ .comments[]
                      | select((.author.login // "" | canon_login) == "claude-code-engineer[bot]")
                      | (.body // "") ]
                    | any(startswith($marker)) ) | not
                ) | .number
              ] | sort
            ' /tmp/raw_issues.json)
            echo "stragglers=$stragglers" >> "$GITHUB_OUTPUT"

            ticket_count=$(jq 'length' <<<"$stragglers")
            echo "mode=$MODE gathered $ticket_count straggler(s)"
            echo "ticket_count=$ticket_count" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload packets artifact
        if: steps.build.outputs.mode == 'single'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-packets
          path: triage-packets.json
          retention-days: 90

  blind-assess-fable:
    name: blind-assess-fable
    needs: gather
    if: needs.gather.outputs.mode == 'single'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # #523: no checkout at all when the ticket's author is untrusted — the rendered prompt embeds
      # everything this job's model needs (rubric + packet) instead, assembled by `gather` while IT holds
      # the checkout (see this workflow's header). The trusted-author path is unchanged from v1.1.
      - name: Checkout base branch
        if: needs.gather.outputs.trusted_author == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      # #526 round-2 review (P0): a job-local sparse `actions/checkout` (the round-1 fix for the
      # missing-validator P0) still materializes the FULL `.git` object database, not just the sparse
      # worktree cone — a shell-capable model could still `git show HEAD:<path>` any file in the repo
      # regardless of what's checked out. `gather` already embedded this static, non-secret script's content
      # into the packets artifact (see this workflow's header); writing it straight from there grants no git
      # history at all, closing this off completely instead of narrowing it.
      - name: Write coverage validator script (untrusted author)
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          mkdir -p .github/triage
          jq -r '.validate_coverage_script' triage-packets.json > .github/triage/validate_coverage.sh
          chmod +x .github/triage/validate_coverage.sh

      # #531: written straight to a workspace file instead of $GITHUB_OUTPUT + a step `env:` mapping — a
      # prompt-scale string held in a step's process environment can trip the exec-time argv/envp size
      # limit on its own, so passing it via `env:` at all stops being safe once it's plausibly that size. A
      # plain file write has no such ceiling, and steps in this job share $RUNNER_TEMP. Both this step and
      # the untrusted-author variant below write to the SAME path — only one of the two ever runs.
      - name: Render blind-assessment prompt (trusted author)
        id: render_prompt_trusted
        if: needs.gather.outputs.trusted_author == 'true'
        run: |
          set -euo pipefail
          cat .github/prompts/triage-blind-assess.md > "$RUNNER_TEMP/triage_fable_prompt.txt"

      # #523: the rubric and the one ticket packet are embedded verbatim into the prompt TEXT (never left
      # for the model to Read as a file, since it gets no tools at all) inside explicit
      # <<<UNTRUSTED_TICKET_DATA>>> delimiters — quarantine framing, defense-in-depth on top of the tool
      # removal below, never a substitute for it.
      - name: Render blind-assessment prompt (untrusted author, capability-reduced)
        id: render_prompt_untrusted
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          preamble=$(jq -r '.blind_assess_untrusted_preamble' triage-packets.json)
          rubric=$(jq -r '.rubric' triage-packets.json)
          packet=$(jq -c '{generated_at, tickets}' triage-packets.json)
          {
            printf '%s\n\n' "$preamble"
            echo "<<<RUBRIC>>>"
            printf '%s\n' "$rubric"
            echo "<<<END RUBRIC>>>"
            echo
            echo "<<<UNTRUSTED_TICKET_DATA>>>"
            printf '%s\n' "$packet"
            echo "<<<END_UNTRUSTED_TICKET_DATA>>>"
          } > "$RUNNER_TEMP/triage_fable_prompt.txt"

      # Same pin rationale as implement-on-ready.yml/checks.yml (automated-researcher#384/#387): the
      # claude-code-action wrapper's auto-install has a known startup-crash class, so the raw CLI is
      # installed and invoked directly at this exact verified-good version.
      - name: Install pinned Claude Code
        id: install_claude
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "path=$(command -v claude)" >> "$GITHUB_OUTPUT"

      - name: Run pinned Claude Code CLI (Fable blind assessor)
        id: run_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_BIN: ${{ steps.install_claude.outputs.path }}
          TRUSTED_AUTHOR: ${{ needs.gather.outputs.trusted_author }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          # Read-only assessor when trusted: no Bash/Edit/Write, so it cannot mutate anything even if
          # instructed to — it can only Read the packets/rubric files already present in its checkout.
          # #523: an untrusted-author ticket instead gets NO tools at all (`--tools ""`) — the rendered
          # prompt above already carries everything it needs as embedded text.
          if [ "$TRUSTED_AUTHOR" = "true" ]; then
            TOOL_ARGS=(--allowedTools Read)
          else
            TOOL_ARGS=(--tools "")
          fi
          # #531: read the prompt straight from the file whichever render step wrote — never round-tripped
          # through a step `env:` mapping, and `--rawfile` reads the file directly, so the prompt never
          # rides on jq's argv either.
          jq -nc --rawfile content "$RUNNER_TEMP/triage_fable_prompt.txt" '{"type":"user","message":{"role":"user","content":$content}}' \
            | "$CLAUDE_BIN" -p --input-format stream-json --output-format stream-json --verbose \
                --model claude-fable-5 \
                "${TOOL_ARGS[@]}" \
                --json-schema '{"type":"object","additionalProperties":false,"required":["assessments"],"properties":{"assessments":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["number","verdict","importance","reasoning"],"properties":{"number":{"type":"integer"},"verdict":{"enum":["DO","SKIP","ASK"]},"importance":{"enum":["low","med","high"]},"reasoning":{"type":"string"}}}}}}' \
            | tee /tmp/claude_stream.jsonl

          structured=$(jq -c 'select(.type=="result") | .structured_output // empty' /tmp/claude_stream.jsonl | tail -n1)
          if [ -z "$structured" ] || [ "$structured" = "null" ]; then
            echo "::error::claude CLI exited 0 but produced no structured_output in its result event"
            exit 1
          fi
          echo "$structured" > triage-blind-fable.json

      - name: Upload Fable blind-assessment artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-blind-fable
          path: triage-blind-fable.json
          retention-days: 90

      # Same fail-closed exact-set check as the adjudicator (PR #456 round 2): a corrupt blind pass must
      # not reach adjudication at all, so this runs immediately after parsing, before the adjudicate job
      # (which needs this job) can even start.
      - name: Validate Fable blind-assessment ticket coverage
        run: .github/triage/validate_coverage.sh "Fable blind assessment" triage-packets.json triage-blind-fable.json .assessments

  blind-assess-sol:
    name: blind-assess-sol
    needs: gather
    if: needs.gather.outputs.mode == 'single'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # #526 round-3 review (P0): during the codex-action run itself, zero repository-derived files exist on
      # the runner's filesystem on the untrusted-author path — the only repo content in the model's reach is
      # the prompt text (preamble + rubric), deliberately embedded below. The trusted-author path is
      # unchanged from v1.1.
      - name: Checkout base branch
        if: needs.gather.outputs.trusted_author == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      # Same prompt FILE as the Fable job (not just the same wording, the identical bytes) — true blind
      # symmetry requires both assessors to see the exact same packet under the exact same instructions.
      - name: Render blind-assessment prompt (trusted author)
        id: render_prompt_trusted
        if: needs.gather.outputs.trusted_author == 'true'
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-blind-assess.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      # #523: same capability-reduced embedding as the Fable job's untrusted-author render step — identical
      # prompt FILE and identical assembly, so blind symmetry holds in the reduced-capability case too.
      - name: Render blind-assessment prompt (untrusted author, capability-reduced)
        id: render_prompt_untrusted
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          preamble=$(jq -r '.blind_assess_untrusted_preamble' triage-packets.json)
          rubric=$(jq -r '.rubric' triage-packets.json)
          packet=$(jq -c '{generated_at, tickets}' triage-packets.json)
          delim="PROMPT_EOF_$(openssl rand -hex 16)"
          {
            echo "prompt<<$delim"
            printf '%s\n\n' "$preamble"
            echo "<<<RUBRIC>>>"
            printf '%s\n' "$rubric"
            echo "<<<END RUBRIC>>>"
            echo
            echo "<<<UNTRUSTED_TICKET_DATA>>>"
            printf '%s\n' "$packet"
            echo "<<<END_UNTRUSTED_TICKET_DATA>>>"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # #526 round-3 review (P0): with the prompt already rendered into GITHUB_OUTPUT, nothing needs
      # the packets file until post-run validation — deleting it here means the codex-action sandbox
      # has NO repo-derived file on disk during the model run; the only repo content the model sees
      # is what the prompt deliberately embeds (preamble + rubric).
      - name: Remove repo-derived files before model run (untrusted author)
        if: needs.gather.outputs.trusted_author != 'true'
        run: rm -f triage-packets.json

      - name: Run codex-action (Sol blind assessor)
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # openai/codex-action v1.11
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":read-only"
          # Same pins as review-on-pr.yml's reviewer (automated-researcher#394): a deliberate choice, bump
          # only as review-on-pr.yml's own conscious change, never as a side effect of touching this file.
          model: gpt-5.6-sol
          effort: medium
          # automated-researcher#497 root cause (see this file's header): `allow-bot-users` only bypasses the
          # collaborator-permission check when codex-action's own isBotActor() sees an actor ending in
          # `[bot]` — true for `issues`/human `workflow_dispatch` runs, but NOT for `schedule` runs, where
          # `github.actor` is the bare login of whoever last modified this workflow file. `allow-users`
          # matches the actor string directly with no bot-suffix precondition, so passing the same dynamic
          # value through it instead covers every trigger type's actor representation uniformly.
          allow-users: ${{ github.actor }}
          prompt: ${{ steps.render_prompt_trusted.outputs.prompt || steps.render_prompt_untrusted.outputs.prompt }}
          output-file: triage-blind-sol.json
          output-schema: |
            {
              "type": "object",
              "additionalProperties": false,
              "required": ["assessments"],
              "properties": {
                "assessments": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "additionalProperties": false,
                    "required": ["number", "verdict", "importance", "reasoning"],
                    "properties": {
                      "number": { "type": "integer" },
                      "verdict": { "enum": ["DO", "SKIP", "ASK"] },
                      "importance": { "enum": ["low", "med", "high"] },
                      "reasoning": { "type": "string" }
                    }
                  }
                }
              }
            }

      - name: Upload Sol blind-assessment artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-blind-sol
          path: triage-blind-sol.json
          retention-days: 90

      # #526 round-3 review (P0): the untrusted-author path deleted triage-packets.json above so the
      # codex-action sandbox had nothing repo-derived to read during the model run; the validate step below
      # needs it back as its second argument.
      - name: Re-download ticket packets (untrusted author)
        if: needs.gather.outputs.trusted_author != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      # #526 round-2 review (P0): same fix as the Fable job's identical step — a sparse `actions/checkout`
      # (the round-1 fix for the missing-validator P0) still restores full `.git` object access to
      # codex-action's read-only sandbox (worktree sparseness doesn't limit `git show HEAD:<path>`), directly
      # contradicting this job's "no checkout at all" comment. Writing the script straight from the
      # already-embedded packets artifact instead grants no git history at all. Moved to run after the model
      # step (#526 round-3): the model run itself must see no repo-derived files at all.
      - name: Write coverage validator script (untrusted author)
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          mkdir -p .github/triage
          jq -r '.validate_coverage_script' triage-packets.json > .github/triage/validate_coverage.sh
          chmod +x .github/triage/validate_coverage.sh

      # Same fail-closed exact-set check as the adjudicator (PR #456 round 2): a corrupt blind pass must
      # not reach adjudication at all, so this runs immediately after parsing, before the adjudicate job
      # (which needs this job) can even start.
      - name: Validate Sol blind-assessment ticket coverage
        run: .github/triage/validate_coverage.sh "Sol blind assessment" triage-packets.json triage-blind-sol.json .assessments

  adjudicate:
    name: adjudicate
    needs: [gather, blind-assess-fable, blind-assess-sol]
    if: needs.gather.outputs.mode == 'single'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      # Full checkout (not just the rubric file) so the adjudicator's Grep/Glob tools can check candidate
      # DO tickets' expected file footprints against the real tree for wave batching. #523: skipped entirely
      # for an untrusted-author ticket — its DO verdict, if any, gets its wave forced to its own issue number
      # below instead (the wave rule's fail-safe/serialized direction), since there is no repo tree here to
      # check a footprint against.
      - name: Checkout base branch
        if: needs.gather.outputs.trusted_author == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      # #526 round-2 review (P0): same fix as the blind-assess jobs' identical step — a sparse
      # `actions/checkout` (the round-1 fix for the missing-validator P0) still materializes the FULL `.git`
      # object database, giving a shell-capable model `git show HEAD:<path>` read access to any file in the
      # repo regardless of the sparse worktree cone. Writing the script straight from the already-embedded
      # packets artifact instead grants no git history at all.
      - name: Write coverage validator script (untrusted author)
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          mkdir -p .github/triage
          jq -r '.validate_coverage_script' triage-packets.json > .github/triage/validate_coverage.sh
          chmod +x .github/triage/validate_coverage.sh

      - name: Download Fable blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-fable

      - name: Download Sol blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-sol

      # The backfill (issue #437's design): the two 2026-07-11 dry runs' recommendations live only in
      # #414's comment thread. Pinned to those two specific comment IDs — not a fetch of the whole
      # thread — so this stays constant-size by construction and can never accumulate this same
      # workflow's own later assessment/rollup comments (PR #456 P0: self-accumulating backfill context).
      # #523: the backfill is one-time historical shaping recommendations, not essential to a correct
      # adjudication — skipped for an untrusted-author ticket to keep that path's prompt minimal (it has no
      # file access to fall back on if this step's output were ever missing, unlike the trusted path).
      - name: Fetch backfill recommendations from #414 (pinned dry-run comments)
        id: backfill
        if: needs.gather.outputs.trusted_author == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # The 2026-07-11 dry-run comments on #414: "Dry-run result: two-model blind triage..." and
          # "Backlog, explained simply...". Fixed on purpose — this is a one-time backfill input, not a
          # live feed.
          BACKFILL_COMMENT_IDS: "4946232374 4948355075"
        run: |
          set -euo pipefail
          {
            echo "# Prior triage recommendations (pinned dry-run comments on #${DIGEST_ISSUE})"
            echo
            for id in $BACKFILL_COMMENT_IDS; do
              gh api "repos/${REPO}/issues/comments/${id}" \
                --jq '"## Comment by " + .user.login + " at " + .created_at + "\n\n" + .body + "\n"'
            done
          } > triage-backfill.md

      - name: Render adjudication prompt (trusted author)
        id: render_prompt_trusted
        if: needs.gather.outputs.trusted_author == 'true'
        run: |
          set -euo pipefail
          # #531: written straight to a workspace file instead of $GITHUB_OUTPUT + a step `env:` mapping —
          # a prompt-scale string held in a step's process environment can trip the exec-time argv/envp
          # size limit on its own, so passing it via `env:` at all stops being safe once it's plausibly
          # that size. A plain file write has no such ceiling, and steps in this job share $RUNNER_TEMP.
          # Both this step and the untrusted-author variant below write to the SAME path — only one of the
          # two ever runs.
          cat .github/prompts/triage-adjudicate.md > "$RUNNER_TEMP/triage_adjudicate_prompt.txt"

      # #523: rubric + ticket packet + both blind assessments embedded verbatim into the prompt TEXT (no
      # backfill — see above), inside explicit <<<UNTRUSTED_TICKET_DATA>>> delimiters for the ticket-filer
      # text specifically (the blind assessments are trusted, model-generated JSON, not filer-authored, so
      # they get their own distinct delimiter instead).
      - name: Render adjudication prompt (untrusted author, capability-reduced)
        id: render_prompt_untrusted
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          preamble=$(jq -r '.adjudicate_untrusted_preamble' triage-packets.json)
          rubric=$(jq -r '.rubric' triage-packets.json)
          packet=$(jq -c '{generated_at, tickets}' triage-packets.json)
          blind=$(jq -n --slurpfile f triage-blind-fable.json --slurpfile s triage-blind-sol.json -c '{fable: $f[0], sol: $s[0]}')
          {
            printf '%s\n\n' "$preamble"
            echo "<<<RUBRIC>>>"
            printf '%s\n' "$rubric"
            echo "<<<END RUBRIC>>>"
            echo
            echo "<<<UNTRUSTED_TICKET_DATA>>>"
            printf '%s\n' "$packet"
            echo "<<<END_UNTRUSTED_TICKET_DATA>>>"
            echo
            echo "<<<BLIND_ASSESSMENTS>>>"
            printf '%s\n' "$blind"
            echo "<<<END_BLIND_ASSESSMENTS>>>"
          } > "$RUNNER_TEMP/triage_adjudicate_prompt.txt"

      - name: Install pinned Claude Code
        id: install_claude
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "path=$(command -v claude)" >> "$GITHUB_OUTPUT"

      - name: Run pinned Claude Code CLI (Fable sighted adjudication)
        id: run_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_BIN: ${{ steps.install_claude.outputs.path }}
          TRUSTED_AUTHOR: ${{ needs.gather.outputs.trusted_author }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          # Read/Grep/Glob only when trusted — no Bash/Edit/Write/gh either way. This pass produces a
          # PROPOSAL; it has no path to mutate any issue even if instructed to. #523: an untrusted-author
          # ticket instead gets NO tools at all (`--tools ""`) — the rendered prompt above already carries
          # the rubric, packet, and both blind assessments as embedded text.
          if [ "$TRUSTED_AUTHOR" = "true" ]; then
            TOOL_ARGS=(--allowedTools Read,Grep,Glob)
          else
            TOOL_ARGS=(--tools "")
          fi
          # #531: read the prompt straight from the file whichever render step wrote — never round-tripped
          # through a step `env:` mapping, and `--rawfile` reads the file directly, so the prompt never
          # rides on jq's argv either.
          jq -nc --rawfile content "$RUNNER_TEMP/triage_adjudicate_prompt.txt" '{"type":"user","message":{"role":"user","content":$content}}' \
            | "$CLAUDE_BIN" -p --input-format stream-json --output-format stream-json --verbose \
                --model claude-fable-5 \
                "${TOOL_ARGS[@]}" \
                --json-schema '{"type":"object","additionalProperties":false,"required":["tickets"],"properties":{"tickets":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["number","verdict","proposed_body_edit","wave","notes"],"properties":{"number":{"type":"integer"},"verdict":{"enum":["DO","SKIP","ASK"]},"proposed_body_edit":{"type":["string","null"]},"wave":{"type":["integer","null"]},"notes":{"type":"string"}}}}}}' \
            | tee /tmp/claude_stream.jsonl

          structured=$(jq -c 'select(.type=="result") | .structured_output // empty' /tmp/claude_stream.jsonl | tail -n1)
          if [ -z "$structured" ] || [ "$structured" = "null" ]; then
            echo "::error::claude CLI exited 0 but produced no structured_output in its result event"
            exit 1
          fi
          echo "$structured" > triage-adjudication.json

      # #523: a capability-reduced adjudication has no repo access, so it cannot check this ticket's file
      # footprint against any other open DO ticket the way the trusted-author path does (RUBRIC.md's
      # file-disjoint wave-batching rule) — the model is instructed to report wave 1 for a DO verdict
      # specifically BECAUSE it can't do that check. Override it here, mechanically, to this ticket's own
      # issue number instead: globally unique by construction, so it can never accidentally collide with,
      # and therefore never silently batches with, any other ticket's wave. This is the wave rule's own
      # fail-safe direction (serialize, don't batch, when disjointness isn't verified), enforced by the
      # workflow rather than relied upon from the model's own output.
      - name: Force serialized wave for untrusted-author DO verdict
        if: needs.gather.outputs.trusted_author != 'true'
        run: |
          set -euo pipefail
          jq '.tickets |= map(if .verdict == "DO" then .wave = .number else . end)' triage-adjudication.json > /tmp/adj_wave.json
          mv /tmp/adj_wave.json triage-adjudication.json

      - name: Upload adjudication artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-adjudication
          path: triage-adjudication.json
          retention-days: 90

      # A confidently incomplete assessment is worse than none (PR #456 P0/round 2): assert the returned
      # ticket-number set is EXACTLY the gathered set, no omissions/duplicates/invented numbers, using the
      # same shared check the two blind-assess jobs already ran on their own outputs. On any mismatch, fail
      # loudly with the diff in the log and post nothing — post-results is gated on `needs: adjudicate`, so
      # a failure here already prevents any comment; post-failure-notice makes that failure visible.
      # --check-wave (PR #456 round 5) additionally enforces DO => integer wave >= 1, SKIP/ASK => null wave
      # — only this call site passes it, since the blind-assessment schema has no `wave` field to check.
      - name: Validate adjudication ticket coverage
        run: .github/triage/validate_coverage.sh "adjudication" triage-packets.json triage-adjudication.json .tickets --check-wave

  post-results:
    name: post-results
    needs: [gather, blind-assess-fable, blind-assess-sol, adjudicate]
    # Single-ticket mode only (PR #501 review round, P0-3): sweep mode no longer produces triage-adjudication
    # / triage-blind-* artifacts at all (see sweep-dispatch-rollup below), so this job has nothing to post in
    # sweep mode and must not run there.
    if: needs.gather.outputs.mode == 'single'
    # Fresh runner, no repo checkout — same rationale as the old post-digest job: only ever talks to the
    # GitHub API, using its own freshly minted token, never whatever host state a prior agent-running job
    # left behind.
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Download adjudication
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-adjudication

      - name: Download Fable blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-fable

      - name: Download Sol blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-sol

      # Per-ticket `disagreement` is computed HERE, from the two validated blind passes' own recorded
      # verdicts — never taken from the adjudicator's self-report (PR #456 P0/round 4: the blind-vs-sighted
      # agreement signal is this design's audit anchor, so it must be mechanical, not asserted). The rendered
      # body's first line is the machine-parseable marker (verdict) the rollup step below re-reads back off
      # the issue later; the second line carries the escaped one-line notes the same way. The (only
      # practically unbounded) proposed-body-edit block is dropped in favor of a run-artifact pointer if the
      # full comment would exceed GitHub's 65536-char comment cap.
      - name: Render per-ticket assessment comments
        id: render
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          jq -n --slurpfile packets triage-packets.json --slurpfile adj triage-adjudication.json \
                --slurpfile fable triage-blind-fable.json --slurpfile sol triage-blind-sol.json \
                --arg run_url "$RUN_URL" '
            # HTML-comment-safe: a literal "-->" in model-authored text would otherwise terminate the
            # marker comment early; collapse to one line so the marker stays a single scannable line.
            def esc_marker: gsub("-->"; "- >") | gsub("\n"; " ");
            # automated-researcher#523 (agentic-engineering#56 precedent): any `@handle`-shaped substring in
            # model-authored text derived from a ticket (possibly untrusted-author, on this public repo) is
            # neutralized before it enters this App-authored comment, so a filer-crafted
            # "@some-allowlisted-identity ..." string quoted verbatim by a model can never itself become a
            # live mention once this comment posts — an App-authored comment passes exactly the author
            # filters the other actuators in this pipeline trust. #526 round-2 review (P0): the original
            # approach wrapped the match in a FIXED single backtick on each side, relying on it forming a
            # Markdown inline code span — but a backtick run already adjacent in the surrounding
            # attacker-controlled text (of a different length than the one we insert) defeats the CommonMark
            # equal-length-delimiter matching rule and can leave the handle outside any code span, live. A
            # zero-width space (U+200B) inserted between "@" and the handle instead breaks the GitHub mention
            # match at the character level — it never depends on Markdown delimiter parsing or on anything
            # else in the surrounding text, so no attacker-controlled context can ever re-enable it. The
            # character renders invisibly, so the text still reads correctly to a human. (Note: a literal
            # apostrophe must never appear inside this bash single-quoted jq program -- bash has no escape
            # for one there, and a stray one silently truncates/reflows the argument actually passed to jq.)
            def esc_mentions: gsub("@(?<h>[A-Za-z0-9](?:[A-Za-z0-9-]{0,37})?)"; "@\u200b\(.h)");
            ($fable[0].assessments | map({(.number|tostring): .}) | add // {}) as $fable_by_num |
            ($sol[0].assessments   | map({(.number|tostring): .}) | add // {}) as $sol_by_num |
            ( $adj[0].tickets | map(
                (.number|tostring) as $k |
                $fable_by_num[$k] as $f |
                $sol_by_num[$k] as $s |
                ($f.verdict != $s.verdict) as $disagreement |
                (.notes | esc_mentions) as $notes |
                ($f.reasoning | esc_mentions) as $f_reasoning |
                ($s.reasoning | esc_mentions) as $s_reasoning |
                ( "<!-- TRIAGE-ASSESSMENT-VERDICT: " + .verdict + " -->\n" +
                  "<!-- TRIAGE-ASSESSMENT-NOTES: " + ($notes | esc_marker) + " -->\n\n" +
                  "# Triage assessment\n\n" +
                  "**Sighted verdict: " + .verdict + "** · blind verdicts: Fable=" + $f.verdict +
                  ", Sol=" + $s.verdict + (if $disagreement then " (blind assessors disagreed)" else "" end) +
                  "\n\n" + $notes + "\n\n" +
                  "<details><summary>Fable blind assessment (importance: " + $f.importance + ")</summary>\n\n" +
                  $f_reasoning + "\n\n</details>\n\n" +
                  "<details><summary>Sol blind assessment (importance: " + $s.importance + ")</summary>\n\n" +
                  $s_reasoning + "\n\n</details>\n\n"
                ) as $head |
                # proposed_body_edit is NOT mention-escaped: it renders inside a fenced code block below,
                # where GitHub never parses @mentions live regardless, and the whole purpose of this field is to
                # be a byte-faithful "full replacement body" a human can copy straight into the ticket —
                # mutating it here would defeat that. automated-researcher#526 round-1 review (P0): a FIXED
                # ``` fence let ticket-controlled content containing its own triple-backtick run close the
                # fence early, moving whatever followed (including a quoted @handle) into normally-parsed
                # markdown where GitHub DOES parse mentions live — defeating the neutralization above.
                # The CommonMark rule is that a closing fence needs >= the opening fences backtick count,
                # so sizing the fence to one longer than the longest backtick run anywhere in the content
                # makes it impossible for any content run to act as a closing fence — content stays untouched.
                # (Note: a literal apostrophe must never appear inside this bash single-quoted jq program.)
                (if .proposed_body_edit != null then
                   ((.proposed_body_edit | [scan("`+")] | map(length) | max) // 0) as $max_backtick_run |
                   ([$max_backtick_run + 1, 3] | max) as $fence_len |
                   ("`" * $fence_len) as $fence |
                   "## Proposed replacement body\n\n<details><summary>proposed replacement body</summary>\n\n" +
                   $fence + "\n" + .proposed_body_edit + "\n" + $fence + "\n\n</details>\n\n"
                 else "" end) as $edit_block |
                ($head + $edit_block + "Full run: " + $run_url + "\n") as $full_body |
                ( if ($full_body | length) > 64000 then
                    ($head + "Proposed replacement body omitted here (too large for a single comment) — see the full run artifact: " + $run_url + "\n")
                  else $full_body end
                ) as $final_body |
                {(.number|tostring): $final_body}
              ) | add // {}
            )
          ' > ticket-comments.json

      - name: Mint claude engineer App token
        id: mint_claude_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Idempotent per-ticket upsert: find an existing marker comment on the issue (there is at most one, by
      # construction — every write here goes through this same find-or-create) and PATCH it in place; only
      # create a new comment when none exists yet. This is what makes a re-run for the same ticket (a manual
      # workflow_dispatch re-request, or a `reopened` re-trigger) edit its prior comment instead of stacking.
      - name: Post/update per-ticket assessment comments
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          numbers=$(jq -r 'keys[]' ticket-comments.json)
          if [ -z "$numbers" ]; then
            echo "no tickets to assess this run"
          fi
          for n in $numbers; do
            body=$(jq -r --arg k "$n" '.[$k]' ticket-comments.json)
            # Author-filtered upsert target (P0-1, PR #501 review round): only a comment actually authored
            # by the claude engineer App identity (either login representation the GitHub API uses — #381
            # precedent) is treated as "our" existing assessment comment to PATCH. Unfiltered, an outsider's
            # marker-shaped comment on this public repo would get silently overwritten by our next PATCH
            # instead of us creating our own comment.
            existing_id=$(gh api "repos/$REPO/issues/$n/comments" --paginate | jq -s --arg marker "$ASSESSMENT_MARKER_PREFIX" '
              def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
              (add // []) as $all
                | if ($all | type) != "array" then error("comments fetch returned non-array (API error body?): " + ($all | tostring)) else $all end
                | map(select(((.user.login // "" | canon_login) == "claude-code-engineer[bot]") and ((.body // "") | startswith($marker))))
                | sort_by(.created_at) | last | .id // empty
            ')
            if [ -n "$existing_id" ]; then
              gh api "repos/$REPO/issues/comments/$existing_id" -X PATCH -f body="$body" > /dev/null
              echo "updated existing assessment comment on #$n (comment $existing_id)"
            else
              gh issue comment "$n" --repo "$REPO" --body "$body"
              echo "posted new assessment comment on #$n"
            fi
          done

      # #543: surface the sighted verdict as a workflow-owned label so the researcher can filter the issue
      # list (`label:triage:ask` = the attention queue) without a comments-fetch + marker-parse per issue.
      # The assessment comment above remains canonical; this label is a derived cache with a single writer
      # (this step, only) — no other workflow or human is expected to edit `triage:*`. `gh label create
      # --force` upserts idempotently, so "create once per repo" holds without a separate existence check.
      - name: Ensure triage:do/ask/skip labels exist
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for spec in "triage:do|0e8a16|Sighted triage verdict: DO (workflow-owned — written only by triage-assess.yml)" \
                      "triage:ask|fbca04|Sighted triage verdict: ASK (workflow-owned — written only by triage-assess.yml)" \
                      "triage:skip|cccccc|Sighted triage verdict: SKIP (workflow-owned — written only by triage-assess.yml)"; do
            IFS='|' read -r name color desc <<< "$spec"
            if ! gh label create "$name" --repo "$REPO" --color "$color" --description "$desc" --force; then
              echo "::warning::failed to create/update label $name — next assessment pass retries"
            fi
          done

      # Applied immediately after the comment above (#543 item 2): remove any existing `triage:*` label
      # first — a re-assessment (manual `workflow_dispatch` re-request, or `reopened`) must not leave a stale
      # verdict's label sitting alongside the new one — then add the one matching the sighted verdict. Label
      # application failure is a `::warning`, never a run failure (#543 item 3): the assessment comment
      # already landed, and the next assessment pass repairs the label.
      - name: Apply triage:do/ask/skip label
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          for n in $(jq -r '.tickets[].number' triage-adjudication.json); do
            verdict=$(jq -r --arg n "$n" '.tickets[] | select((.number|tostring) == $n) | .verdict' triage-adjudication.json)
            case "$verdict" in
              DO) label=triage:do ;;
              ASK) label=triage:ask ;;
              SKIP) label=triage:skip ;;
              *) echo "::warning::unrecognized verdict '$verdict' for #$n — skipping label"; continue ;;
            esac
            for stale in triage:do triage:ask triage:skip; do
              gh issue edit "$n" --repo "$REPO" --remove-label "$stale" >/dev/null 2>&1 || true
            done
            if ! gh issue edit "$n" --repo "$REPO" --add-label "$label" 2>&1; then
              echo "::warning::failed to apply label $label to #$n — next assessment pass retries"
            fi
          done

  sweep-dispatch-rollup:
    name: sweep-dispatch-rollup
    needs: gather
    # Sweep mode only (P0-3, PR #501 review round): the sweep leg no longer assesses stragglers itself — it
    # dispatches each through the per-issue path and then rebuilds the rollup.
    if: needs.gather.outputs.mode == 'sweep'
    # Fresh runner, no repo checkout — only ever talks to the GitHub API, same rationale as post-results.
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Mint claude engineer App token
        id: mint_claude_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Dispatch, don't assess (P0-3): each straggler gets its own per-issue `workflow_dispatch` run instead
      # of being assessed inline here, so the exactly-one-assessment-comment invariant is enforced by that
      # run's own `triage-assess-<n>` concurrency group rather than by a non-atomic find-then-create racing a
      # concurrent event-driven run. Dispatched with the App token (not the ambient read-only `github.token`)
      # so the dispatched run's own actor is `claude-code-engineer[bot]` — an allowlisted identity — and its
      # own `gather` job authorization check passes; the CLAUDE_APP GitHub App must be granted `Actions:
      # write` for this call to succeed (a provisioning requirement alongside its existing Issues/Contents
      # scopes, same category as AGENTS.md's "Secrets this flow needs").
      - name: Dispatch per-issue assessment for each straggler
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
          STRAGGLERS: ${{ needs.gather.outputs.stragglers }}
        run: |
          set -euo pipefail
          numbers=$(jq -r '.[]' <<<"$STRAGGLERS")
          if [ -z "$numbers" ]; then
            echo "no stragglers this sweep"
          fi
          for n in $numbers; do
            gh workflow run triage-assess.yml --repo "$REPO" -f issue_number="$n"
            echo "dispatched per-issue assessment for #$n"
          done

      # Rollup (#497 design item 4): re-list open issues (so a straggler whose dispatched run already landed
      # this run shows up), find every one that carries no disposition/escalation label yet (still awaiting a
      # researcher decision) AND already has an assessment comment authored by the claude engineer App
      # identity (P0-1 — an outsider's marker-shaped comment must be invisible here), and re-derive its
      # verdict/notes straight off that comment's own marker lines — never off this run's dispatch calls, so
      # a ticket assessed in an EARLIER run (event-driven or a prior sweep) is represented correctly too, and
      # a ticket THIS run just dispatched but whose run hasn't finished yet is correctly absent rather than
      # asserted. Posted EVERY sweep run now, never skipped (P0-2): an empty set edits the same idempotent
      # comment to an explicit empty-state body instead of leaving a stale table up, and it is never deleted
      # (the researcher's one anchor link into this history).
      - name: Build + post rollup digest on #414
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          if ! gh issue list --repo "$REPO" --state open \
              --json number,title,labels,comments --limit 300 > /tmp/all_open.json; then
            echo "::error::gh issue list (rollup) failed"
            exit 1
          fi

          jq --arg marker "$ASSESSMENT_MARKER_PREFIX" '
            def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
            [ .[] | select(
                (.labels | map(.name) | any(. == "ready" or . == "blocked" or . == "parked" or . == "other"
                  or . == "needs-human" or . == "needs-senior-engineer")) | not
              ) | ( .comments
                    | map(select((.author.login // "" | canon_login) == "claude-code-engineer[bot]"))
                    | map(.body // "") | map(select(startswith($marker))) | first ) as $m
              | select($m != null)
              | {
                  number, title,
                  verdict: ($m | capture($marker + " (?<v>[A-Z]+) -->") .v),
                  notes: ($m | capture("TRIAGE-ASSESSMENT-NOTES: (?<n>.*) -->") .n)
                }
            ] | sort_by(.number)
          ' /tmp/all_open.json > awaiting-action.json

          count=$(jq 'length' awaiting-action.json)
          if [ "$count" -eq 0 ]; then
            {
              echo "# Triage rollup (${NOW})"
              echo
              echo "No assessments awaiting researcher action as of ${NOW}. (This sweep may have just dispatched straggler assessments asynchronously — a dispatched ticket appears here once its own run posts an assessment comment.)"
            } > digest-body.md
          else
            # Cap the table at a safe comment-size budget with an explicit overflow line (P1) rather than
            # post one unbounded comment — chosen over the prior v1 implementation's sequential "part k/N"
            # chunking because v1.1's rollup is a single idempotently-edited comment (P0-2), not a fresh one
            # every run, and chunking into many comments would break that single-anchor invariant.
            jq -r --arg url "${SERVER_URL}/${REPO}" --arg run_url "$RUN_URL" --argjson budget 64000 --arg now "$NOW" '
              def esc: gsub("\\|"; "\\\\|") | gsub("\n"; " ");
              # automated-researcher#523: `title` comes straight off a fresh `gh issue list` (untrusted —
              # any open ticket, from any filer, on this public repo), unlike `notes` which is re-derived
              # from a marker line this same pipeline already mention-escaped — so only title needs it here;
              # escaping notes again would just double-wrap it.
              # #526 round-2 review (P0): same zero-width-space technique as the post-results job identical
              # definition — a fixed-backtick code-span wrap is defeated by an attacker-controlled backtick
              # run of a different length already adjacent in the title text; U+200B breaks the mention match
              # at the character level instead, independent of any surrounding Markdown delimiters. (Note: a
              # literal apostrophe must never appear inside this bash single-quoted jq program.)
              def esc_mentions: gsub("@(?<h>[A-Za-z0-9](?:[A-Za-z0-9-]{0,37})?)"; "@\u200b\(.h)");
              def row: "| [#" + (.number|tostring) + "](" + $url + "/issues/" + (.number|tostring) + ") | " +
                       (.title | esc_mentions | esc) + " | " + .verdict + " | " + (.notes | esc) + " |";
              ( "# Triage rollup (" + $now + ")\n\n" +
                (length | tostring) + " open ticket(s) already assessed and awaiting a researcher decision. " +
                "This sweep dispatches straggler assessments asynchronously (per-issue `workflow_dispatch` " +
                "runs) and rebuilds this rollup right after — a ticket dispatched THIS run may not appear " +
                "below yet if its run has not finished; it will show up on the next sweep or event-driven " +
                "assessment.\n\n" +
                "| # | Title | Verdict | Notes |\n|---|-------|---------|-------|\n"
              ) as $header |
              (map(row)) as $rows |
              ( reduce $rows[] as $r ({body: "", n: 0, done: false};
                  if .done then .
                  else
                    (.body + $r + "\n") as $candidate |
                    if (($header | length) + ($candidate | length)) > $budget then . + {done: true}
                    else {body: $candidate, n: (.n + 1), done: false}
                    end
                  end
                )
              ) as $packed |
              $header + $packed.body +
              ( if $packed.n < ($rows | length) then
                  "\n_...and " + (($rows | length) - $packed.n | tostring) + " more — see the Actions run: " + $run_url + "_\n"
                else "" end
              )
            ' awaiting-action.json > digest-body.md
          fi

          MARKER='<!-- TRIAGE-DIGEST -->'
          body="${MARKER}"$'\n\n'"$(cat digest-body.md)"

          # Author-filtered upsert target (P0-1): only a comment actually authored by the claude engineer
          # App identity is treated as "our" existing rollup comment to PATCH.
          existing_id=$(gh api "repos/$REPO/issues/${DIGEST_ISSUE}/comments" --paginate | jq -s --arg marker "$MARKER" '
            def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
            (add // []) as $all
              | if ($all | type) != "array" then error("comments fetch returned non-array (API error body?): " + ($all | tostring)) else $all end
              | map(select(((.user.login // "" | canon_login) == "claude-code-engineer[bot]") and ((.body // "") | startswith($marker))))
              | sort_by(.created_at) | last | .id // empty
          ')
          if [ -n "$existing_id" ]; then
            gh api "repos/$REPO/issues/comments/$existing_id" -X PATCH -f body="$body" > /dev/null
            echo "updated rollup digest comment on #${DIGEST_ISSUE} (comment $existing_id)"
          else
            gh issue comment "$DIGEST_ISSUE" --repo "$REPO" --body "$body"
            echo "posted new rollup digest comment on #${DIGEST_ISSUE}"
          fi

  post-failure-notice:
    name: post-failure-notice
    needs: [gather, blind-assess-fable, blind-assess-sol, adjudicate, post-results, sweep-dispatch-rollup]
    # failure() is true only when a job in the chain actually ran and failed — a job skipped by its own
    # (unauthorized-actor) `if:` propagates as a skip, not a failure, so a rejected/unauthorized attempt
    # correctly produces no noise here. This is the visibility fix for defect 3: a run that gets this far
    # and then fails must not fail silently the way the scheduled actor-gate bug did for five days.
    if: failure()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Mint claude engineer App token
        id: mint_claude_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Recomputed independently from event context (not from `gather`'s outputs, which may not exist if
      # gather itself is the job that failed): `issues` → the triggering issue; `workflow_dispatch` with
      # issue_number → that issue; otherwise (schedule, or a sweep-mode dispatch) → the sweep leg, notice
      # goes to #414 (design item 5: "the triggering issue (event path) or #414 (sweep path)").
      - name: Post one-line failure notice
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_INPUT: ${{ github.event.inputs.issue_number }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          if [ "$EVENT_NAME" = "issues" ]; then
            TARGET="$EVENT_ISSUE_NUMBER"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_ISSUE_INPUT" ]; then
            TARGET="$DISPATCH_ISSUE_INPUT"
          else
            TARGET="$DIGEST_ISSUE"
          fi

          gh issue comment "$TARGET" --repo "$REPO" \
            --body "Triage assessment run failed: ${RUN_URL}"
