name: triage-assess

# GitHub-native SWE pipeline, triager leg v1 (automated-researcher#437 — the "Triager, v1" stage of the
# design synthesized on #414). Scheduled + workflow_dispatch: assesses the open `needs-design` backlog and
# proposes, but writes NOTHING to any assessed issue — v1 deliberately has no label/body permissions, and
# creates no Issues of any kind. Both blind assessments (Fable, Sol — same cross-family split
# review-on-pr.yml already uses) and the sighted adjudication's full proposal (verdicts + proposed body
# edits + proposed wave composition + disagreement analysis) are archived as run artifacts for
# auditability; a bounded summary (counts + per-ticket verdict table + a link back to the run artifact),
# marker-prefixed and chunked into sequential "part k/N" comments if it would ever outgrow one comment, is
# posted to #414. The adjudicator's returned ticket set is asserted to exactly match the gathered set
# before any of this is posted — on any mismatch the run fails closed and posts nothing.
# See AGENTS.md "GitHub-native SWE pipeline (BYOK)" for the trust model, and .github/triage/RUBRIC.md for
# the rubric every assessment/adjudication pass applies. v2 (write actions: body edits, budgeted flips,
# ASK parking) is a separate ticket, filed only after v1's proposals prove out for a batch or two.

on:
  schedule:
    # Weekly; cadence is not load-bearing at current backlog volume (issue #437 acceptance) and GitHub
    # throttles aggressive crons anyway (observed on automated-researcher#431's reconciler).
    - cron: '0 15 * * 1'
  workflow_dispatch: {}

concurrency:
  group: triage-assess
  cancel-in-progress: true

permissions:
  contents: read
  issues: read

env:
  # Fixed digest destination (issue #437's design: "post the whole proposal as a single comment on #414").
  DIGEST_ISSUE: 414

jobs:
  gather:
    name: gather
    runs-on: ubuntu-latest
    # Coarse pre-filter on workflow_dispatch, mirroring the other pipeline workflows' actor allowlist (this
    # run's last job mints a write-capable engineer token to post the digest comment, so the same
    # defense-in-depth applies even though this workflow's blast radius is much smaller than the
    # implementor/reviewer legs — it makes zero mutations to any assessed issue). A `schedule` event has no
    # meaningful actor to check, so it is always allowed. Downstream jobs all key off `needs: gather`, so
    # gating this one job gates the whole chain.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
        contains(fromJSON('["antondelafuente","claude-code-engineer[bot]","codex-engineer[bot]","app/claude-code-engineer","app/codex-engineer"]'), github.actor))
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      # Builds one packet per open `needs-design` issue: title, body, labels, age, the full comment thread
      # (triage-relevant context often lives there, e.g. a later comment narrowing scope), and
      # `referenced_issues` (a #NNN-mention scan across body+comments — a hint toward linked incidents, not
      # an authoritative link graph).
      - name: Build ticket packets
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if ! gh issue list --repo "$REPO" --label needs-design --state open \
              --json number,title,body,labels,createdAt,comments --limit 300 > /tmp/raw_issues.json; then
            echo "::error::gh issue list failed"
            exit 1
          fi

          jq --arg now "$NOW" '
            def age_days(created):
              (($now | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) - (created | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)) / 86400 | floor;
            def refs(text; self):
              ([text | scan("#[0-9]+")] | map(ltrimstr("#") | tonumber) | unique) - [self];
            {
              generated_at: $now,
              tickets: [ .[] | {
                number,
                title,
                body: (.body // ""),
                labels: [.labels[].name],
                created_at: .createdAt,
                age_days: age_days(.createdAt),
                comments: [ .comments[] | {author: .author.login, created_at: .createdAt, body: (.body // "")} ],
                referenced_issues: refs( ((.body // "") + "\n" + ([.comments[].body // ""] | join("\n"))); .number )
              } ]
            }
          ' /tmp/raw_issues.json > triage-packets.json

          ticket_count=$(jq '.tickets | length' triage-packets.json)
          echo "gathered $ticket_count open needs-design ticket(s)"
          echo "ticket_count=$ticket_count" >> "$GITHUB_OUTPUT"

      - name: Upload packets artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-packets
          path: triage-packets.json
          retention-days: 90

  blind-assess-fable:
    name: blind-assess-fable
    needs: gather
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Render blind-assessment prompt
        id: render_prompt
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-blind-assess.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      # Same pin rationale as implement-on-ready.yml/checks.yml (automated-researcher#384/#387): the
      # claude-code-action wrapper's auto-install has a known startup-crash class, so the raw CLI is
      # installed and invoked directly at this exact verified-good version.
      - name: Install pinned Claude Code
        id: install_claude
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "path=$(command -v claude)" >> "$GITHUB_OUTPUT"

      - name: Run pinned Claude Code CLI (Fable blind assessor)
        id: run_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.render_prompt.outputs.prompt }}
          CLAUDE_BIN: ${{ steps.install_claude.outputs.path }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          # Read-only assessor: no Bash/Edit/Write, so it cannot mutate anything even if instructed to —
          # it can only Read the packets/rubric files already present in its checkout.
          jq -nc --arg content "$PROMPT" '{"type":"user","message":{"role":"user","content":$content}}' \
            | "$CLAUDE_BIN" -p --input-format stream-json --output-format stream-json --verbose \
                --model claude-fable-5 \
                --allowedTools Read \
                --json-schema '{"type":"object","additionalProperties":false,"required":["assessments"],"properties":{"assessments":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["number","verdict","importance","reasoning"],"properties":{"number":{"type":"integer"},"verdict":{"enum":["DO","SKIP","ASK"]},"importance":{"enum":["low","med","high"]},"reasoning":{"type":"string"}}}}}}' \
            | tee /tmp/claude_stream.jsonl

          structured=$(jq -c 'select(.type=="result") | .structured_output // empty' /tmp/claude_stream.jsonl | tail -n1)
          if [ -z "$structured" ] || [ "$structured" = "null" ]; then
            echo "::error::claude CLI exited 0 but produced no structured_output in its result event"
            exit 1
          fi
          echo "$structured" > triage-blind-fable.json

      - name: Upload Fable blind-assessment artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-blind-fable
          path: triage-blind-fable.json
          retention-days: 90

  blind-assess-sol:
    name: blind-assess-sol
    needs: gather
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      # Same prompt FILE as the Fable job (not just the same wording, the identical bytes) — true blind
      # symmetry requires both assessors to see the exact same packet under the exact same instructions.
      - name: Render blind-assessment prompt
        id: render_prompt
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-blind-assess.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run codex-action (Sol blind assessor)
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # openai/codex-action v1.11
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":read-only"
          # Same pins as review-on-pr.yml's reviewer (automated-researcher#394): a deliberate choice, bump
          # only as review-on-pr.yml's own conscious change, never as a side effect of touching this file.
          model: gpt-5.6-sol
          effort: medium
          allow-bot-users: ${{ github.actor }}
          prompt: ${{ steps.render_prompt.outputs.prompt }}
          output-file: triage-blind-sol.json
          output-schema: |
            {
              "type": "object",
              "additionalProperties": false,
              "required": ["assessments"],
              "properties": {
                "assessments": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "additionalProperties": false,
                    "required": ["number", "verdict", "importance", "reasoning"],
                    "properties": {
                      "number": { "type": "integer" },
                      "verdict": { "enum": ["DO", "SKIP", "ASK"] },
                      "importance": { "enum": ["low", "med", "high"] },
                      "reasoning": { "type": "string" }
                    }
                  }
                }
              }
            }

      - name: Upload Sol blind-assessment artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-blind-sol
          path: triage-blind-sol.json
          retention-days: 90

  adjudicate:
    name: adjudicate
    needs: [gather, blind-assess-fable, blind-assess-sol]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      # Full checkout (not just the rubric file) so the adjudicator's Grep/Glob tools can check candidate
      # DO tickets' expected file footprints against the real tree for wave batching.
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Download Fable blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-fable

      - name: Download Sol blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-sol

      # The backfill (issue #437's design): the two 2026-07-11 dry runs' recommendations live only in
      # #414's comment thread. Pinned to those two specific comment IDs — not a fetch of the whole
      # thread — so this stays constant-size by construction and can never accumulate this same
      # workflow's own later digest comments on #414 (PR #456 P0: self-accumulating backfill context).
      - name: Fetch backfill recommendations from #414 (pinned dry-run comments)
        id: backfill
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # The 2026-07-11 dry-run comments on #414: "Dry-run result: two-model blind triage..." and
          # "Backlog, explained simply...". Fixed on purpose — this is a one-time backfill input, not a
          # live feed.
          BACKFILL_COMMENT_IDS: "4946232374 4948355075"
        run: |
          set -euo pipefail
          {
            echo "# Prior triage recommendations (pinned dry-run comments on #${DIGEST_ISSUE})"
            echo
            for id in $BACKFILL_COMMENT_IDS; do
              gh api "repos/${REPO}/issues/comments/${id}" \
                --jq '"## Comment by " + .user.login + " at " + .created_at + "\n\n" + .body + "\n"'
            done
          } > triage-backfill.md

      - name: Render adjudication prompt
        id: render_prompt
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-adjudicate.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install pinned Claude Code
        id: install_claude
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "path=$(command -v claude)" >> "$GITHUB_OUTPUT"

      - name: Run pinned Claude Code CLI (Fable sighted adjudication)
        id: run_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.render_prompt.outputs.prompt }}
          CLAUDE_BIN: ${{ steps.install_claude.outputs.path }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          # Read/Grep/Glob only — no Bash/Edit/Write/gh. This pass produces a PROPOSAL; it has no path to
          # mutate any issue even if instructed to.
          jq -nc --arg content "$PROMPT" '{"type":"user","message":{"role":"user","content":$content}}' \
            | "$CLAUDE_BIN" -p --input-format stream-json --output-format stream-json --verbose \
                --model claude-fable-5 \
                --allowedTools Read,Grep,Glob \
                --json-schema '{"type":"object","additionalProperties":false,"required":["tickets","summary"],"properties":{"tickets":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["number","verdict","disagreement","proposed_body_edit","wave","notes"],"properties":{"number":{"type":"integer"},"verdict":{"enum":["DO","SKIP","ASK"]},"disagreement":{"type":"boolean"},"proposed_body_edit":{"type":["string","null"]},"wave":{"type":["integer","null"]},"notes":{"type":"string"}}}},"summary":{"type":"string"}}}' \
            | tee /tmp/claude_stream.jsonl

          structured=$(jq -c 'select(.type=="result") | .structured_output // empty' /tmp/claude_stream.jsonl | tail -n1)
          if [ -z "$structured" ] || [ "$structured" = "null" ]; then
            echo "::error::claude CLI exited 0 but produced no structured_output in its result event"
            exit 1
          fi
          echo "$structured" > triage-adjudication.json

      - name: Upload adjudication artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-adjudication
          path: triage-adjudication.json
          retention-days: 90

      # A confidently incomplete digest is worse than no digest (PR #456 P0): assert the returned
      # ticket-number set is EXACTLY the gathered set, no omissions/duplicates/invented numbers. On any
      # mismatch, fail loudly with the diff in the log and post nothing — post-digest is gated on
      # `needs: adjudicate`, so a failure here already prevents any comment; a scheduled run retries next
      # cycle.
      - name: Validate adjudication ticket coverage
        run: |
          set -euo pipefail
          gathered=$(jq -c '[.tickets[].number] | sort' triage-packets.json)
          returned_sorted=$(jq -c '[.tickets[].number] | sort' triage-adjudication.json)
          returned_unique=$(jq -c '[.tickets[].number] | unique' triage-adjudication.json)

          if [ "$returned_sorted" != "$returned_unique" ]; then
            echo "::error::adjudication returned duplicate ticket numbers. returned=${returned_sorted}"
            exit 1
          fi

          if [ "$gathered" != "$returned_unique" ]; then
            missing=$(jq -nc --argjson g "$gathered" --argjson r "$returned_unique" '$g - $r')
            extra=$(jq -nc --argjson g "$gathered" --argjson r "$returned_unique" '$r - $g')
            echo "::error::adjudication ticket-number set does not match the gathered set. missing=${missing} extra=${extra} gathered=${gathered} returned=${returned_unique}"
            exit 1
          fi

          echo "adjudication covers all $(jq 'length' <<< "$gathered") gathered ticket(s) exactly, no duplicates/invented numbers"

  post-digest:
    name: post-digest
    needs: adjudicate
    # Fresh runner, no repo checkout — same rationale as implement-on-ready's enable-automerge job: only
    # ever talks to the GitHub API, using its own freshly minted token, never whatever host state a prior
    # agent-running job left behind.
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Download adjudication
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-adjudication

      # v1 creates no issues (PR #456 P0: an unbounded issue-creation fallback both can't actually stay
      # under the same 65536-char limit it exists to dodge, and violates the agent-filed-Issue labeling
      # rules). Split the render in two: `full` (everything, including proposed body edits, which can be
      # arbitrarily large) always goes to a run artifact; `summary` (counts + per-ticket verdict table +
      # a link back to this run's artifact) is the bounded piece that goes to #414 as a comment.
      - name: Render digest markdown (full artifact + bounded #414 summary)
        id: render
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          jq -n --slurpfile packets triage-packets.json --slurpfile adj triage-adjudication.json --arg run_url "$RUN_URL" '
            # Model-authored free text (title, notes) can contain a literal "|" or embedded newline, either
            # of which would corrupt a markdown table row — escape both before interpolating into one.
            def esc: gsub("\\|"; "\\\\|") | gsub("\n"; " ");
            ($packets[0].tickets | map({(.number|tostring): .title}) | add // {}) as $titles |
            $adj[0] as $a |
            ( "# Triage digest (" + $packets[0].generated_at + ")\n\n" +
              "Assessed " + ($packets[0].tickets | length | tostring) + " open `needs-design` ticket(s). " +
              "Assess-and-propose only (automated-researcher#437 v1) — no label or body writes were made by this run.\n\n" +
              $a.summary + "\n\n" +
              "| # | Title | Verdict | Disagreement | Wave | Notes |\n" +
              "|---|-------|---------|--------------|------|-------|\n" +
              ( $a.tickets | sort_by(.number) | map(
                  "| #" + (.number|tostring) + " | " + (($titles[(.number|tostring)] // "?") | esc) + " | " + .verdict +
                  " | " + (if .disagreement then "yes" else "" end) +
                  " | " + ((.wave // "") | tostring) +
                  " | " + (.notes | esc) + " |"
                ) | join("\n") )
            ) as $header_and_table |
            {
              summary: ($header_and_table + "\n\nFull digest (verdicts + proposed body edits): " + $run_url + "\n"),
              full: ($header_and_table + "\n\n## Proposed body edits\n\n" +
                ( ($a.tickets | map(select(.proposed_body_edit != null))) as $edits |
                  if ($edits | length) == 0 then "None proposed this run.\n"
                  else ($edits | map(
                      "### #" + (.number|tostring) + "\n\n<details><summary>proposed replacement body</summary>\n\n```\n" + .proposed_body_edit + "\n```\n\n</details>\n"
                    ) | join("\n"))
                  end
                ) + "\n"
              )
            }
          ' > digest-rendered.json

          jq -r '.full' digest-rendered.json > digest-full.md
          jq -r '.summary' digest-rendered.json > digest-summary.md

      - name: Upload full digest artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-digest-full
          path: digest-full.md
          retention-days: 90

      - name: Mint claude engineer App token
        id: mint_claude_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Every comment this workflow posts on #414 is prefixed with a fixed marker (PR #456 P0:
      # self-accumulation) so it is recognizable as this workflow's own output at a glance; the backfill
      # step above no longer fetches the #414 thread at all (it reads two pinned comment IDs), so this
      # marker doesn't gate anything today, but keeping every digest comment self-identifying is cheap and
      # future-proofs any later reader of that thread.
      - name: Post digest summary comment(s) on #414
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          MARKER='<!-- TRIAGE-DIGEST -->'
          LIMIT=64000

          summary=$(cat digest-summary.md)
          single="${MARKER}"$'\n\n'"${summary}"

          if [ "${#single}" -le "$LIMIT" ]; then
            gh issue comment "$DIGEST_ISSUE" --repo "$REPO" --body "$single"
            exit 0
          fi

          echo "digest summary is ${#single} chars (> ${LIMIT}); chunking into sequential '#${DIGEST_ISSUE}' comments"

          # Reserve room for the marker + "part k/N" header added to every chunk, then pack line-by-line
          # (never mid-line) so a chunk never cuts a markdown table row in half; a single line that alone
          # exceeds the budget (not expected at current ticket-note lengths) is hard-split as a last
          # resort so every posted chunk still respects the hard cap.
          HEADER_BUDGET=200
          BUDGET=$((LIMIT - HEADER_BUDGET))
          jq -Rs --argjson budget "$BUDGET" '
            (split("\n") as $lines |
             reduce $lines[] as $line ([""];
               (if .[-1] == "" then $line else .[-1] + "\n" + $line end) as $candidate |
               if (.[-1] | length) > 0 and ($candidate | length) > $budget
               then . + [$line]
               else (.[0:-1] + [$candidate])
               end
             )
            ) as $packed |
            [ $packed[] |
              if length <= $budget then [.]
              else [range(0; length; $budget) as $i | .[$i:$i+$budget]]
              end
            ] | flatten
          ' digest-summary.md > /tmp/digest-chunks.json

          total=$(jq 'length' /tmp/digest-chunks.json)
          for i in $(seq 0 $((total - 1))); do
            n=$((i + 1))
            chunk=$(jq -r --argjson i "$i" '.[$i]' /tmp/digest-chunks.json)
            body="${MARKER}"$'\n\n'"part ${n}/${total}"$'\n\n'"${chunk}"
            gh issue comment "$DIGEST_ISSUE" --repo "$REPO" --body "$body"
          done
