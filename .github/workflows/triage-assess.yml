name: triage-assess

# GitHub-native SWE pipeline, triager leg v1.1 (automated-researcher#497, evolving the v1 batch design from
# #437/#414 without granting any new write powers — still assess-and-propose, zero label/body writes). Fixes
# three verified v1 defects:
#   1. v1 gathered open `needs-design` issues, but tickets are filed unlabeled in practice — a v1 run assessed
#      nothing. This leg is event-driven (`issues: [opened, reopened]`) and assesses the ONE triggering ticket
#      regardless of its labels, plus a scheduled backstop sweep (see below) that no longer filters by label.
#   2. A weekly batch mismatched the pipeline's own event-summoned-never-polling rule. Assessment now happens
#      per-ticket, within minutes of filing.
#   3. Scheduled runs failed silently since 2026-07-13: on a `schedule` event `github.actor` is the bare login
#      of whoever last modified this workflow file (no `[bot]` suffix for an App identity), so
#      openai/codex-action's `allow-bot-users` bypass (which requires `isBotActor()` — an actor ending in
#      `[bot]` — before it even looks at the allowlist) never engaged; execution fell through to a
#      collaborator-permission lookup for that bare login, which 404s (an App isn't a listed collaborator
#      under that form) and rejects the run. Root-caused by reading codex-action's own
#      `src/checkActorPermissions.ts` (pinned SHA below) rather than guessing. Fixed by passing the SAME
#      dynamic actor value via `allow-users` instead: it matches the actor string directly, with no
#      bot-suffix precondition, so it engages correctly under every trigger type's representation of the
#      actor (bare login on `schedule`, `<slug>[bot]` on `issues`/human `workflow_dispatch`) with one line, no
#      per-event branching needed. A failed run is now also VISIBLE (see post-failure-notice) — silent
#      failure is what hid this defect for five days.
#
# Both blind assessments (Fable, Sol — same cross-family split review-on-pr.yml already uses) and the sighted
# adjudication's full proposal (verdicts + proposed body edits + proposed wave composition) are archived as
# run artifacts for auditability, same as v1. Output moves ONTO the ticket now instead of a digest-only
# comment on #414 (#497 design item 2): each assessed ticket gets exactly one idempotency-marked comment
# (`<!-- TRIAGE-ASSESSMENT-VERDICT: ... -->` as its first line; a re-run for the same ticket — a manual
# `workflow_dispatch` re-request, or a `reopened` re-trigger — edits that comment in place rather than
# stacking a new one) carrying both blind verdicts, the sighted verdict, reasoning, and the proposed body
# edit as an explicit replacement block. All three model outputs have their returned ticket set asserted to
# exactly match the gathered set (.github/triage/validate_coverage.sh) immediately after parsing; on any
# mismatch the run fails closed at that point, so a corrupt blind pass never even reaches adjudication (same
# invariant v1 established, PR #456). The adjudication output additionally gets the same semantic
# wave-assignment check (--check-wave).
#
# The weekly `schedule` leg is now a BACKSTOP SWEEP (#497 design item 3), not the primary path: it gathers
# open issues that are NOT `ready`, NOT `needs-human`/`needs-senior-engineer`, and carry NO assessment comment
# yet (event-missed stragglers — including, on its first run, today's entire unlabeled backlog) and assesses
# each through the identical blind/adjudicate pipeline. It additionally posts (or updates) one compact ROLLUP
# digest comment on #414 — every open, still-undispositioned issue that already carries an assessment comment
# (from this run or any earlier one), i.e. "awaiting researcher action" — only when that set is non-empty
# (#497 design item 4). `workflow_dispatch` accepts an optional `issue_number`: given, it re-runs the
# single-ticket path against that issue's current state (a manual re-request); omitted, it runs the sweep.
#
# Every entry path is actor-gated to the same allowlist every other actuator in this pipeline uses
# (researcher + the two engineer bots, both App-identity representations — automated-researcher#381's
# dual-representation precedent). This repo is public (AGENTS.md), so `issues: opened/reopened` fires on ANY
# GitHub user's issue — without this gate, an outside filer could trigger paid model calls and a bot-authored
# comment on their own issue for free (openai/codex-action's own docs/security.md warns about exactly this
# class of abuse). An issue filed by anyone else still gets picked up by the backstop sweep, just on the
# sweep's own (non-attacker-controlled) cadence instead of within minutes.
#
# Concurrency is per-issue (#497 design item 7): bulk filings assess in parallel, keyed by issue number; the
# sweep uses its own single group so it doesn't race a concurrent sweep, but never blocks on (or is blocked
# by) any per-issue run.
#
# See AGENTS.md "GitHub-native SWE pipeline (BYOK)" for the trust model, and .github/triage/RUBRIC.md for the
# rubric every assessment/adjudication pass applies.

on:
  issues:
    types: [opened, reopened]
  schedule:
    # Weekly backstop; cadence is not load-bearing (issue #437 acceptance) since the event path now handles
    # same-day assessment and this leg exists only to catch stragglers.
    - cron: '0 15 * * 1'
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Assess this one issue (its current state). Leave blank to run the backstop sweep instead."
        required: false
        type: number

concurrency:
  # Per-issue group so bulk filings assess in parallel without racing each other; the sweep (no issue number
  # in play) gets its own fixed group instead of colliding with — or blocking on — any per-issue run.
  group: triage-assess-${{ github.event.issue.number || github.event.inputs.issue_number || 'sweep' }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read

env:
  # Fixed rollup destination (issue #437's design, reused by #497's sweep leg).
  DIGEST_ISSUE: 414
  # First line of every posted assessment comment — used identically to detect "already assessed" (gather's
  # straggler exclusion and the rollup's awaiting-action scan) and to find-or-edit the comment in post-results.
  # Keep this literal in sync across all three uses if it's ever changed.
  ASSESSMENT_MARKER_PREFIX: "<!-- TRIAGE-ASSESSMENT-VERDICT:"

jobs:
  gather:
    name: gather
    runs-on: ubuntu-latest
    # Coarse pre-filter (mirrors every other actuator's job-level `if:` in this pipeline). `schedule` has no
    # meaningful actor and is always allowed (it's not attacker-controlled timing). `issues` is gated on the
    # EVENT SENDER (spoof-resistant — the event payload field, not a guessable title/label match) so an
    # outside actor on this public repo can't trigger a privileged run by opening OR reopening an issue;
    # their ticket still reaches the backstop sweep. Deliberately `sender`, not `issue.user` (the original
    # filer): for `reopened` those can differ (an allowlisted person reopening someone else's old issue for
    # reassessment must still work), and `sender` is the correct "who caused this event" check either way —
    # for `opened` it's the same identity as the filer. `workflow_dispatch` is gated on the triggering actor,
    # same allowlist as every other manual lever in this pipeline.
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'issues' &&
        contains(fromJSON('["antondelafuente","claude-code-engineer[bot]","codex-engineer[bot]","app/claude-code-engineer","app/codex-engineer"]'), github.event.sender.login)) ||
      (github.event_name == 'workflow_dispatch' &&
        contains(fromJSON('["antondelafuente","claude-code-engineer[bot]","codex-engineer[bot]","app/claude-code-engineer","app/codex-engineer"]'), github.actor))
    outputs:
      mode: ${{ steps.build.outputs.mode }}
      issue_number: ${{ steps.build.outputs.issue_number }}
      ticket_count: ${{ steps.build.outputs.ticket_count }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      # Single-ticket mode (an `issues` event, or `workflow_dispatch` with issue_number set) builds a one-entry
      # packet for exactly the triggering/requested issue, unconditionally — its current labels never gate
      # whether it gets assessed. Sweep mode (schedule, or workflow_dispatch with no issue_number) builds one
      # packet per open issue that is NOT `ready`, NOT `needs-human`/`needs-senior-engineer`, and carries no
      # assessment comment yet (the event-missed-stragglers predicate, #497 design item 3) — deliberately NOT
      # excluding `blocked`/`parked`/`other` here: those are rare, and once assessed once they carry the
      # marker comment too, so the no-marker clause already keeps them from being reassessed forever.
      - name: Build ticket packet(s)
        id: build
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_INPUT: ${{ github.event.inputs.issue_number }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          if [ "$EVENT_NAME" = "issues" ]; then
            MODE=single
            ISSUE_NUMBER="$EVENT_ISSUE_NUMBER"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_ISSUE_INPUT" ]; then
            MODE=single
            ISSUE_NUMBER="$DISPATCH_ISSUE_INPUT"
          else
            MODE=sweep
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          [ "$MODE" = single ] && echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "$MODE" = single ]; then
            if ! gh issue view "$ISSUE_NUMBER" --repo "$REPO" \
                --json number,title,body,labels,createdAt,comments > /tmp/raw_issue.json; then
              echo "::error::gh issue view $ISSUE_NUMBER failed"
              exit 1
            fi
            jq -s '.' /tmp/raw_issue.json > /tmp/candidates.json
          else
            if ! gh issue list --repo "$REPO" --state open \
                --json number,title,body,labels,createdAt,comments --limit 300 > /tmp/raw_issues.json; then
              echo "::error::gh issue list failed"
              exit 1
            fi
            # No pagination in v1 (issue #437 acceptance) — a silently truncated fetch must not pass
            # coverage validation against itself, so fail loudly instead of masking it.
            raw_count=$(jq 'length' /tmp/raw_issues.json)
            if [ "$raw_count" -eq 300 ]; then
              echo "::error::gh issue list returned exactly 300 open issue(s) — backlog exceeds gather limit — raise it"
              exit 1
            fi
            jq --arg marker "$ASSESSMENT_MARKER_PREFIX" '
              [ .[] | select(
                  (.labels | map(.name) | any(. == "ready" or . == "needs-human" or . == "needs-senior-engineer")) | not
                ) | select(
                  ([.comments[].body // ""] | any(startswith($marker))) | not
                ) ]
            ' /tmp/raw_issues.json > /tmp/candidates.json
          fi

          jq --arg now "$NOW" '
            def age_days(created):
              (($now | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) - (created | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime)) / 86400 | floor;
            def refs(text; self):
              ([text | scan("#[0-9]+")] | map(ltrimstr("#") | tonumber) | unique) - [self];
            {
              generated_at: $now,
              tickets: [ .[] | {
                number,
                title,
                body: (.body // ""),
                labels: [.labels[].name],
                created_at: .createdAt,
                age_days: age_days(.createdAt),
                comments: [ .comments[] | {author: .author.login, created_at: .createdAt, body: (.body // "")} ],
                referenced_issues: refs( ((.body // "") + "\n" + ([.comments[].body // ""] | join("\n"))); .number )
              } ]
            }
          ' /tmp/candidates.json > triage-packets.json

          ticket_count=$(jq '.tickets | length' triage-packets.json)
          echo "mode=$MODE gathered $ticket_count ticket(s)"
          echo "ticket_count=$ticket_count" >> "$GITHUB_OUTPUT"

      - name: Upload packets artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-packets
          path: triage-packets.json
          retention-days: 90

  blind-assess-fable:
    name: blind-assess-fable
    needs: gather
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Render blind-assessment prompt
        id: render_prompt
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-blind-assess.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      # Same pin rationale as implement-on-ready.yml/checks.yml (automated-researcher#384/#387): the
      # claude-code-action wrapper's auto-install has a known startup-crash class, so the raw CLI is
      # installed and invoked directly at this exact verified-good version.
      - name: Install pinned Claude Code
        id: install_claude
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "path=$(command -v claude)" >> "$GITHUB_OUTPUT"

      - name: Run pinned Claude Code CLI (Fable blind assessor)
        id: run_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.render_prompt.outputs.prompt }}
          CLAUDE_BIN: ${{ steps.install_claude.outputs.path }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          # Read-only assessor: no Bash/Edit/Write, so it cannot mutate anything even if instructed to —
          # it can only Read the packets/rubric files already present in its checkout.
          jq -nc --arg content "$PROMPT" '{"type":"user","message":{"role":"user","content":$content}}' \
            | "$CLAUDE_BIN" -p --input-format stream-json --output-format stream-json --verbose \
                --model claude-fable-5 \
                --allowedTools Read \
                --json-schema '{"type":"object","additionalProperties":false,"required":["assessments"],"properties":{"assessments":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["number","verdict","importance","reasoning"],"properties":{"number":{"type":"integer"},"verdict":{"enum":["DO","SKIP","ASK"]},"importance":{"enum":["low","med","high"]},"reasoning":{"type":"string"}}}}}}' \
            | tee /tmp/claude_stream.jsonl

          structured=$(jq -c 'select(.type=="result") | .structured_output // empty' /tmp/claude_stream.jsonl | tail -n1)
          if [ -z "$structured" ] || [ "$structured" = "null" ]; then
            echo "::error::claude CLI exited 0 but produced no structured_output in its result event"
            exit 1
          fi
          echo "$structured" > triage-blind-fable.json

      - name: Upload Fable blind-assessment artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-blind-fable
          path: triage-blind-fable.json
          retention-days: 90

      # Same fail-closed exact-set check as the adjudicator (PR #456 round 2): a corrupt blind pass must
      # not reach adjudication at all, so this runs immediately after parsing, before the adjudicate job
      # (which needs this job) can even start.
      - name: Validate Fable blind-assessment ticket coverage
        run: .github/triage/validate_coverage.sh "Fable blind assessment" triage-packets.json triage-blind-fable.json .assessments

  blind-assess-sol:
    name: blind-assess-sol
    needs: gather
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      # Same prompt FILE as the Fable job (not just the same wording, the identical bytes) — true blind
      # symmetry requires both assessors to see the exact same packet under the exact same instructions.
      - name: Render blind-assessment prompt
        id: render_prompt
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-blind-assess.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run codex-action (Sol blind assessor)
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # openai/codex-action v1.11
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":read-only"
          # Same pins as review-on-pr.yml's reviewer (automated-researcher#394): a deliberate choice, bump
          # only as review-on-pr.yml's own conscious change, never as a side effect of touching this file.
          model: gpt-5.6-sol
          effort: medium
          # automated-researcher#497 root cause (see this file's header): `allow-bot-users` only bypasses the
          # collaborator-permission check when codex-action's own isBotActor() sees an actor ending in
          # `[bot]` — true for `issues`/human `workflow_dispatch` runs, but NOT for `schedule` runs, where
          # `github.actor` is the bare login of whoever last modified this workflow file. `allow-users`
          # matches the actor string directly with no bot-suffix precondition, so passing the same dynamic
          # value through it instead covers every trigger type's actor representation uniformly.
          allow-users: ${{ github.actor }}
          prompt: ${{ steps.render_prompt.outputs.prompt }}
          output-file: triage-blind-sol.json
          output-schema: |
            {
              "type": "object",
              "additionalProperties": false,
              "required": ["assessments"],
              "properties": {
                "assessments": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "additionalProperties": false,
                    "required": ["number", "verdict", "importance", "reasoning"],
                    "properties": {
                      "number": { "type": "integer" },
                      "verdict": { "enum": ["DO", "SKIP", "ASK"] },
                      "importance": { "enum": ["low", "med", "high"] },
                      "reasoning": { "type": "string" }
                    }
                  }
                }
              }
            }

      - name: Upload Sol blind-assessment artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-blind-sol
          path: triage-blind-sol.json
          retention-days: 90

      # Same fail-closed exact-set check as the adjudicator (PR #456 round 2): a corrupt blind pass must
      # not reach adjudication at all, so this runs immediately after parsing, before the adjudicate job
      # (which needs this job) can even start.
      - name: Validate Sol blind-assessment ticket coverage
        run: .github/triage/validate_coverage.sh "Sol blind assessment" triage-packets.json triage-blind-sol.json .assessments

  adjudicate:
    name: adjudicate
    needs: [gather, blind-assess-fable, blind-assess-sol]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      # Full checkout (not just the rubric file) so the adjudicator's Grep/Glob tools can check candidate
      # DO tickets' expected file footprints against the real tree for wave batching.
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          persist-credentials: false

      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Download Fable blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-fable

      - name: Download Sol blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-sol

      # The backfill (issue #437's design): the two 2026-07-11 dry runs' recommendations live only in
      # #414's comment thread. Pinned to those two specific comment IDs — not a fetch of the whole
      # thread — so this stays constant-size by construction and can never accumulate this same
      # workflow's own later assessment/rollup comments (PR #456 P0: self-accumulating backfill context).
      - name: Fetch backfill recommendations from #414 (pinned dry-run comments)
        id: backfill
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # The 2026-07-11 dry-run comments on #414: "Dry-run result: two-model blind triage..." and
          # "Backlog, explained simply...". Fixed on purpose — this is a one-time backfill input, not a
          # live feed.
          BACKFILL_COMMENT_IDS: "4946232374 4948355075"
        run: |
          set -euo pipefail
          {
            echo "# Prior triage recommendations (pinned dry-run comments on #${DIGEST_ISSUE})"
            echo
            for id in $BACKFILL_COMMENT_IDS; do
              gh api "repos/${REPO}/issues/comments/${id}" \
                --jq '"## Comment by " + .user.login + " at " + .created_at + "\n\n" + .body + "\n"'
            done
          } > triage-backfill.md

      - name: Render adjudication prompt
        id: render_prompt
        run: |
          set -euo pipefail
          {
            echo "prompt<<PROMPT_EOF"
            cat .github/prompts/triage-adjudicate.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install pinned Claude Code
        id: install_claude
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207
          echo "path=$(command -v claude)" >> "$GITHUB_OUTPUT"

      - name: Run pinned Claude Code CLI (Fable sighted adjudication)
        id: run_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: ${{ steps.render_prompt.outputs.prompt }}
          CLAUDE_BIN: ${{ steps.install_claude.outputs.path }}
        timeout-minutes: 30
        run: |
          set -euo pipefail
          # Read/Grep/Glob only — no Bash/Edit/Write/gh. This pass produces a PROPOSAL; it has no path to
          # mutate any issue even if instructed to.
          jq -nc --arg content "$PROMPT" '{"type":"user","message":{"role":"user","content":$content}}' \
            | "$CLAUDE_BIN" -p --input-format stream-json --output-format stream-json --verbose \
                --model claude-fable-5 \
                --allowedTools Read,Grep,Glob \
                --json-schema '{"type":"object","additionalProperties":false,"required":["tickets"],"properties":{"tickets":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["number","verdict","proposed_body_edit","wave","notes"],"properties":{"number":{"type":"integer"},"verdict":{"enum":["DO","SKIP","ASK"]},"proposed_body_edit":{"type":["string","null"]},"wave":{"type":["integer","null"]},"notes":{"type":"string"}}}}}}' \
            | tee /tmp/claude_stream.jsonl

          structured=$(jq -c 'select(.type=="result") | .structured_output // empty' /tmp/claude_stream.jsonl | tail -n1)
          if [ -z "$structured" ] || [ "$structured" = "null" ]; then
            echo "::error::claude CLI exited 0 but produced no structured_output in its result event"
            exit 1
          fi
          echo "$structured" > triage-adjudication.json

      - name: Upload adjudication artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: triage-adjudication
          path: triage-adjudication.json
          retention-days: 90

      # A confidently incomplete assessment is worse than none (PR #456 P0/round 2): assert the returned
      # ticket-number set is EXACTLY the gathered set, no omissions/duplicates/invented numbers, using the
      # same shared check the two blind-assess jobs already ran on their own outputs. On any mismatch, fail
      # loudly with the diff in the log and post nothing — post-results is gated on `needs: adjudicate`, so
      # a failure here already prevents any comment; post-failure-notice makes that failure visible.
      # --check-wave (PR #456 round 5) additionally enforces DO => integer wave >= 1, SKIP/ASK => null wave
      # — only this call site passes it, since the blind-assessment schema has no `wave` field to check.
      - name: Validate adjudication ticket coverage
        run: .github/triage/validate_coverage.sh "adjudication" triage-packets.json triage-adjudication.json .tickets --check-wave

  post-results:
    name: post-results
    needs: [gather, blind-assess-fable, blind-assess-sol, adjudicate]
    # Fresh runner, no repo checkout — same rationale as the old post-digest job: only ever talks to the
    # GitHub API, using its own freshly minted token, never whatever host state a prior agent-running job
    # left behind.
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Download ticket packets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-packets

      - name: Download adjudication
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-adjudication

      - name: Download Fable blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-fable

      - name: Download Sol blind assessment
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: triage-blind-sol

      # Per-ticket `disagreement` is computed HERE, from the two validated blind passes' own recorded
      # verdicts — never taken from the adjudicator's self-report (PR #456 P0/round 4: the blind-vs-sighted
      # agreement signal is this design's audit anchor, so it must be mechanical, not asserted). The rendered
      # body's first line is the machine-parseable marker (verdict) the rollup step below re-reads back off
      # the issue later; the second line carries the escaped one-line notes the same way. The (only
      # practically unbounded) proposed-body-edit block is dropped in favor of a run-artifact pointer if the
      # full comment would exceed GitHub's 65536-char comment cap.
      - name: Render per-ticket assessment comments
        id: render
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          jq -n --slurpfile packets triage-packets.json --slurpfile adj triage-adjudication.json \
                --slurpfile fable triage-blind-fable.json --slurpfile sol triage-blind-sol.json \
                --arg run_url "$RUN_URL" '
            # HTML-comment-safe: a literal "-->" in model-authored text would otherwise terminate the
            # marker comment early; collapse to one line so the marker stays a single scannable line.
            def esc_marker: gsub("-->"; "- >") | gsub("\n"; " ");
            ($fable[0].assessments | map({(.number|tostring): .}) | add // {}) as $fable_by_num |
            ($sol[0].assessments   | map({(.number|tostring): .}) | add // {}) as $sol_by_num |
            ( $adj[0].tickets | map(
                (.number|tostring) as $k |
                $fable_by_num[$k] as $f |
                $sol_by_num[$k] as $s |
                ($f.verdict != $s.verdict) as $disagreement |
                ( "<!-- TRIAGE-ASSESSMENT-VERDICT: " + .verdict + " -->\n" +
                  "<!-- TRIAGE-ASSESSMENT-NOTES: " + (.notes | esc_marker) + " -->\n\n" +
                  "# Triage assessment\n\n" +
                  "**Sighted verdict: " + .verdict + "** · blind verdicts: Fable=" + $f.verdict +
                  ", Sol=" + $s.verdict + (if $disagreement then " (blind assessors disagreed)" else "" end) +
                  "\n\n" + .notes + "\n\n" +
                  "<details><summary>Fable blind assessment (importance: " + $f.importance + ")</summary>\n\n" +
                  $f.reasoning + "\n\n</details>\n\n" +
                  "<details><summary>Sol blind assessment (importance: " + $s.importance + ")</summary>\n\n" +
                  $s.reasoning + "\n\n</details>\n\n"
                ) as $head |
                (if .proposed_body_edit != null then
                   "## Proposed replacement body\n\n<details><summary>proposed replacement body</summary>\n\n```\n" +
                   .proposed_body_edit + "\n```\n\n</details>\n\n"
                 else "" end) as $edit_block |
                ($head + $edit_block + "Full run: " + $run_url + "\n") as $full_body |
                ( if ($full_body | length) > 64000 then
                    ($head + "Proposed replacement body omitted here (too large for a single comment) — see the full run artifact: " + $run_url + "\n")
                  else $full_body end
                ) as $final_body |
                {(.number|tostring): $final_body}
              ) | add // {}
            )
          ' > ticket-comments.json

      - name: Mint claude engineer App token
        id: mint_claude_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Idempotent per-ticket upsert: find an existing marker comment on the issue (there is at most one, by
      # construction — every write here goes through this same find-or-create) and PATCH it in place; only
      # create a new comment when none exists yet. This is what makes a re-run for the same ticket (a manual
      # workflow_dispatch re-request, or a `reopened` re-trigger) edit its prior comment instead of stacking.
      - name: Post/update per-ticket assessment comments
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          numbers=$(jq -r 'keys[]' ticket-comments.json)
          if [ -z "$numbers" ]; then
            echo "no tickets to assess this run"
          fi
          for n in $numbers; do
            body=$(jq -r --arg k "$n" '.[$k]' ticket-comments.json)
            # `gh api --jq` has no `--arg` (it's a query-string-only flag, unlike the standalone jq
            # binary) — the marker constant is spliced into the query string directly instead; it's a
            # workflow-defined literal, not untrusted input.
            existing_id=$(gh api "repos/$REPO/issues/$n/comments" --paginate \
              --jq ".[] | select(.body | startswith(\"$ASSESSMENT_MARKER_PREFIX\")) | .id" \
              | head -n1)
            if [ -n "$existing_id" ]; then
              gh api "repos/$REPO/issues/comments/$existing_id" -X PATCH -f body="$body" > /dev/null
              echo "updated existing assessment comment on #$n (comment $existing_id)"
            else
              gh issue comment "$n" --repo "$REPO" --body "$body"
              echo "posted new assessment comment on #$n"
            fi
          done

      # Rollup (sweep leg only, #497 design item 4): re-list open issues AFTER the writes above (so a
      # straggler assessed by THIS run already shows up), find every one that carries no disposition/
      # escalation label yet (still awaiting a researcher decision) AND already has an assessment comment,
      # and re-derive its verdict/notes straight off that comment's own marker lines — never off this run's
      # in-memory adjudication, so a ticket assessed in an EARLIER run (event-driven or a prior sweep) is
      # represented correctly too. Posted only when non-empty; skipped entirely otherwise (design item 4).
      - name: Build + post rollup digest on #414 (sweep only)
        if: needs.gather.outputs.mode == 'sweep'
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          if ! gh issue list --repo "$REPO" --state open \
              --json number,title,labels,comments --limit 300 > /tmp/all_open.json; then
            echo "::error::gh issue list (rollup) failed"
            exit 1
          fi

          jq --arg marker "$ASSESSMENT_MARKER_PREFIX" '
            def esc: gsub("\\|"; "\\\\|") | gsub("\n"; " ");
            [ .[] | select(
                (.labels | map(.name) | any(. == "ready" or . == "blocked" or . == "parked" or . == "other"
                  or . == "needs-human" or . == "needs-senior-engineer")) | not
              ) | (.comments | map(.body // "") | map(select(startswith($marker))) | first) as $m
              | select($m != null)
              | {
                  number, title,
                  verdict: ($m | capture($marker + " (?<v>[A-Z]+) -->") .v),
                  notes: ($m | capture("TRIAGE-ASSESSMENT-NOTES: (?<n>.*) -->") .n)
                }
            ] | sort_by(.number)
          ' /tmp/all_open.json > awaiting-action.json

          count=$(jq 'length' awaiting-action.json)
          if [ "$count" -eq 0 ]; then
            echo "no open, undispositioned, already-assessed tickets — skipping rollup (design item 4: only when non-empty)"
            exit 0
          fi

          jq -r --arg url "${SERVER_URL}/${REPO}" '
            def esc: gsub("\\|"; "\\\\|") | gsub("\n"; " ");
            "# Triage rollup (" + (now | strftime("%Y-%m-%dT%H:%M:%SZ")) + ")\n\n" +
            (length | tostring) + " open ticket(s) already assessed and awaiting a researcher decision.\n\n" +
            "| # | Title | Verdict | Notes |\n|---|-------|---------|-------|\n" +
            ( map(
                "| [#" + (.number|tostring) + "](" + $url + "/issues/" + (.number|tostring) + ") | " +
                (.title | esc) + " | " + .verdict + " | " + (.notes | esc) + " |"
              ) | join("\n") )
          ' awaiting-action.json > digest-body.md

          MARKER='<!-- TRIAGE-DIGEST -->'
          body="${MARKER}"$'\n\n'"$(cat digest-body.md)"

          # Same `gh api --jq` has-no-`--arg` constraint as post-results' per-ticket upsert — splice the
          # (workflow-defined) marker literal into the query string directly.
          existing_id=$(gh api "repos/$REPO/issues/${DIGEST_ISSUE}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)
          if [ -n "$existing_id" ]; then
            gh api "repos/$REPO/issues/comments/$existing_id" -X PATCH -f body="$body" > /dev/null
            echo "updated rollup digest comment on #${DIGEST_ISSUE} (comment $existing_id)"
          else
            gh issue comment "$DIGEST_ISSUE" --repo "$REPO" --body "$body"
            echo "posted new rollup digest comment on #${DIGEST_ISSUE}"
          fi

  post-failure-notice:
    name: post-failure-notice
    needs: [gather, blind-assess-fable, blind-assess-sol, adjudicate, post-results]
    # failure() is true only when a job in the chain actually ran and failed — a job skipped by its own
    # (unauthorized-actor) `if:` propagates as a skip, not a failure, so a rejected/unauthorized attempt
    # correctly produces no noise here. This is the visibility fix for defect 3: a run that gets this far
    # and then fails must not fail silently the way the scheduled actor-gate bug did for five days.
    if: failure()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Mint claude engineer App token
        id: mint_claude_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CLAUDE_APP_ID }}
          private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      # Recomputed independently from event context (not from `gather`'s outputs, which may not exist if
      # gather itself is the job that failed): `issues` → the triggering issue; `workflow_dispatch` with
      # issue_number → that issue; otherwise (schedule, or a sweep-mode dispatch) → the sweep leg, notice
      # goes to #414 (design item 5: "the triggering issue (event path) or #414 (sweep path)").
      - name: Post one-line failure notice
        env:
          GH_TOKEN: ${{ steps.mint_claude_token.outputs.token }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          DISPATCH_ISSUE_INPUT: ${{ github.event.inputs.issue_number }}
        run: |
          set -euo pipefail
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"

          if [ "$EVENT_NAME" = "issues" ]; then
            TARGET="$EVENT_ISSUE_NUMBER"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$DISPATCH_ISSUE_INPUT" ]; then
            TARGET="$DISPATCH_ISSUE_INPUT"
          else
            TARGET="$DIGEST_ISSUE"
          fi

          gh issue comment "$TARGET" --repo "$REPO" \
            --body "Triage assessment run failed: ${RUN_URL}"
