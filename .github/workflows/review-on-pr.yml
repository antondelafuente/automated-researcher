name: review-on-pr

# GitHub-native SWE pipeline, review leg (automated-researcher#378 / agentic-engineering#43). Runs the
# cross-family Codex review on PRs opened by the claude engineer bot, and submits a native APPROVE (clean)
# or REQUEST_CHANGES (findings) review as the codex engineer bot. Human PRs and fork PRs are skipped — they
# keep the existing manual review path. See AGENTS.md "GitHub-native SWE pipeline (BYOK)" for the trust
# model and the P0/P1 review-guidance convention this reads from the PR's base ref.
#
# automated-researcher#431: `pull_request` events (opened/synchronize) fire NO run at all while a PR is
# unmergeable (GitHub can't build the refs/pull/N/merge ref to run against) — deterministic platform
# behavior, not event loss, but it means a PR that becomes mergeable again with no NEW push (e.g. a
# conflict resolved via a merge from main) needs an explicit re-fire since no fresh `pull_request` event
# will ever arrive for that head. `workflow_dispatch` (input: pr_number) is that actuator: same
# authorize->review->verdict path, run against the PR's CURRENT head. Used by the reconcile-prs.yml
# scheduled reconciler and as a hand tool; useless against a still-conflicted PR (no merge ref to review).

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to re-fire the review against (its current head)"
        required: true
        type: number

concurrency:
  group: review-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  review:
    name: review
    runs-on: ubuntu-latest
    # Agent-PR predicate (spoof-resistant): the App actor identity, not a title/label/branch-prefix match.
    # Fork PRs never run this job — same-repo `pull_request` only, no secrets ever reach a fork's code.
    # automated-researcher#381: this is a job-level `if:` (evaluated before any step/shell runs), so it
    # can't share the canonical_login() shell helper; both known representations of the App identity are
    # checked explicitly instead (event-payload "<slug>[bot]" and CLI/GraphQL "app/<slug>").
    # automated-researcher#431: the workflow_dispatch branch is only a COARSE pre-filter on the triggering
    # actor (mirrors implement-on-ready.yml) — the "Resolve PR context" step below re-verifies the target
    # PR is same-repo, bot-authored, and open, fresh, before anything else runs. A job-level `if:` has no
    # PR-fork/author fields to check against an arbitrary dispatch-supplied PR number.
    if: |
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (github.event.pull_request.user.login == 'claude-code-engineer[bot]' ||
          github.event.pull_request.user.login == 'app/claude-code-engineer'))
      || (github.event_name == 'workflow_dispatch'
        && contains(fromJSON('["antondelafuente","claude-code-engineer[bot]","codex-engineer[bot]","app/claude-code-engineer","app/codex-engineer"]'), github.actor))
    outputs:
      head_sha: ${{ steps.resolve_pr.outputs.head_sha }}
      pr_number: ${{ steps.resolve_pr.outputs.pr_number }}
    steps:
      # Checkout runs FIRST (same rationale as implement-on-ready#381/address-review#398): the resolve step
      # below sources the canonical-login helper from the working tree, which must exist before it's
      # sourced. A base-branch checkout is trusted content regardless of which step runs first.
      - name: Checkout base branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          # Explicit ref, not the default: without it, a `pull_request` trigger checks out the PR's
          # untrusted MERGE ref (actions/checkout's default for that event), not the base branch this
          # comment claims -- and the resolve step below sources canonical-login.sh from this checkout,
          # in this same job whose later "Run codex-action" step receives OPENAI_API_KEY. base.ref on
          # `pull_request`; this workflow's own ref (its default-branch invocation) on workflow_dispatch.
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          persist-credentials: false

      # Resolves PR_NUMBER/HEAD_SHA/BASE_SHA/BASE_REF for BOTH trigger paths. For `pull_request`, these
      # come straight from the event payload (job-level `if:` already gated it). For `workflow_dispatch`,
      # re-fetches the PR fresh via `gh pr view` and re-applies the SAME predicate the `pull_request` path
      # gets for free from the event payload (same-repo, bot-authored, open) — an allowlisted actor must
      # not be able to point this actuator at an arbitrary human or fork PR.
      - name: Resolve PR context
        id: resolve_pr
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ github.event.inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          source "$GITHUB_WORKSPACE/.github/scripts/canonical-login.sh"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            PR_NUMBER="$DISPATCH_PR"
            pr_json=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json author,isCrossRepository,state,headRefOid,baseRefOid,baseRefName)
            author=$(jq -r '.author.login' <<<"$pr_json")
            is_cross=$(jq -r '.isCrossRepository' <<<"$pr_json")
            state=$(jq -r '.state' <<<"$pr_json")
            author_canon=$(canonical_login "$author")

            if [ "$is_cross" != "false" ]; then
              echo "::error::PR #$PR_NUMBER is a fork PR; refusing to re-fire review"
              exit 1
            fi
            if [ "$author_canon" != "claude-code-engineer[bot]" ]; then
              echo "::error::PR #$PR_NUMBER author '$author' is not the claude engineer bot; refusing to re-fire review"
              exit 1
            fi
            if [ "$state" != "OPEN" ]; then
              echo "::error::PR #$PR_NUMBER is not open (state: $state); refusing to re-fire review"
              exit 1
            fi

            HEAD_SHA=$(jq -r '.headRefOid' <<<"$pr_json")
            BASE_SHA=$(jq -r '.baseRefOid' <<<"$pr_json")
            BASE_REF=$(jq -r '.baseRefName' <<<"$pr_json")
          else
            PR_NUMBER="$EVENT_PR_NUMBER"
            HEAD_SHA="$EVENT_HEAD_SHA"
            BASE_SHA="$EVENT_BASE_SHA"
            BASE_REF="$EVENT_BASE_REF"
          fi

          {
            echo "pr_number=$PR_NUMBER"
            echo "head_sha=$HEAD_SHA"
            echo "base_sha=$BASE_SHA"
            echo "base_ref=$BASE_REF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ steps.resolve_pr.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch base ref
        env:
          BASE_REF: ${{ steps.resolve_pr.outputs.base_ref }}
        run: git fetch --no-tags origin "$BASE_REF"

      - name: Extract review guidance from base AGENTS.md
        id: guidance
        env:
          BASE_REF: ${{ steps.resolve_pr.outputs.base_ref }}
        run: |
          set -euo pipefail
          # Deliberately read AGENTS.md from origin/<base>, NOT the checked-out PR head: a PR that edits
          # this section in the same diff must not be able to weaken the criteria it's reviewed against.
          guidance=$(git show "origin/$BASE_REF:AGENTS.md" \
            | sed -n '/<!-- CODEX-REVIEW-GUIDANCE:BEGIN -->/,/<!-- CODEX-REVIEW-GUIDANCE:END -->/p')
          [ -n "$guidance" ] || { echo "::error::could not extract CODEX-REVIEW-GUIDANCE markers from base AGENTS.md"; exit 1; }
          {
            echo "guidance<<GUIDANCE_EOF"
            echo "$guidance"
            echo "GUIDANCE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch prior review history
        # GitHub-native disposition state (#380): prior codex review rounds + the author's issue-comment
        # responses, so the reviewer can adjudicate rather than re-litigating findings the author already
        # fixed or disputed. Read-only `gh api` calls against this same PR — the job's read token suffices.
        # automated-researcher#389 review: restricted to the pipeline's own trusted identities (originally
        # the same allowlist as implement-on-ready.yml's ALLOWLIST; #507 adds the senior-engineer shepherd,
        # see COMMENT_ALLOW below) — an unrelated or adversarial review/comment must not be able to inject or
        # crowd out disposition context.
        # automated-researcher#389 round 2: reviews and comments are two distinct streams and are capped
        # INDEPENDENTLY, then merged only for rendering. Capping a single merged stream let a burst of
        # trusted-but-routine comments (e.g. the automerge-status notice, owner check-ins) push actual prior
        # codex-engineer[bot] review rounds out of the window even though nothing adversarial happened. The
        # `reviews` stream is also narrowed to codex-engineer[bot] only: it is the sole identity that ever
        # produces genuine prior-review disposition content in this pipeline (submit-verdict's minted app
        # token), so a review submitted under any other identity is never mislabeled as a past Codex verdict.
        # automated-researcher#389 round 3: within the comments stream, a fixed, zero-disposition-content
        # notice (implement-on-ready.yml's "Auto-merge could not be enabled..." message, emitted verbatim by
        # automation with no relation to any finding) is now filtered out before capping, since it is the one
        # deterministically identifiable source of "routine noise" in this pipeline. Beyond that one known
        # pattern, we accept as a residual risk that arbitrary free-text chatter from the three trusted
        # identities (owner, this bot, the senior-engineer shepherd) can still occupy a slot ahead of an
        # older genuine disposition once more than MAX_ROUNDS comments accumulate. This is deliberately
        # best-effort, not exhaustive: (1) the comments stream is restricted to three fully-trusted,
        # human-supervised identities by the round-1 allowlist, so this is a volume/ordering question among
        # trusted parties, never an adversarial-injection one; (2) a keyword/regex classifier for "is this a
        # disposition" would be brittle and risks silently dropping a genuine response phrased without its
        # expected vocabulary, which is worse than best-effort retention; (3) the full comment thread stays
        # visible to a human on the PR page regardless of what's fed to the reviewer; and (4) the prompt's
        # adjudicate-not-suppress instruction means a missing disposition just causes the finding to be
        # judged fresh again, not wrongly suppressed — the safe failure direction. MAX_ROUNDS=6 also
        # comfortably covers this PR's own 3-round history to date.
        #
        # automated-researcher#507: `senior-engineer-agent[bot]` (the in-flight-adjudication shepherd,
        # AGENTS.md's "Senior-engineer leg", #438) is added to COMMENT_ALLOW below. Its rulings are the
        # convergence mechanism's memory — proven live on PR #505, where the shepherd ruled a finding class
        # irreducible-and-accepted in round 3, but the reviewer never saw that ruling (this identity was
        # missing from the allowlist), re-flagged the same class in round 4, and the ladder escalated to
        # needs-human on a disagreement that only existed because the judge was deaf to the adjudicator. Its
        # escalation notices ("needs-senior-engineer applied N times...") are legitimate history too — they
        # tell the reviewer the loop state — so only the one known auto-merge notice above stays filtered by
        # NOISE_PREFIXES, never anything shepherd-authored.
        id: history
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          MAX_ROUNDS=6
          MAX_CHARS=20000
          REVIEW_ALLOW='["codex-engineer[bot]"]'
          COMMENT_ALLOW='["antondelafuente","claude-code-engineer[bot]","senior-engineer-agent[bot]"]'
          # The only comment this pipeline's automation emits itself with no disposition content of its own
          # (implement-on-ready.yml's enable-automerge step, verbatim) — excluded before capping so it can
          # never occupy a slot ahead of a real prior-round response.
          NOISE_PREFIXES='["Auto-merge could not be enabled automatically"]'

          # canon_login mirrors .github/scripts/canonical-login.sh's remap (a jq filter can't source that
          # bash helper, so the same "app/<slug>" -> "<slug>[bot]" logic is duplicated here) so a review or
          # comment authored by the trusted identities is recognized under either login form the API uses.
          # --paginate emits one JSON array per page; `jq -s add` slurps and flattens them into one array
          # regardless of page count.
          reviews=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate | jq -s --argjson allow "$REVIEW_ALLOW" '
            def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
            add // [] | map(select((.body // "") != "" and ((.user.login | canon_login) as $c | ($allow | index($c)) != null)))
              | map({ts: .submitted_at, kind: "review", user: .user.login, state, body})
          ')
          comments=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate | jq -s --argjson allow "$COMMENT_ALLOW" --argjson noise "$NOISE_PREFIXES" '
            def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
            add // [] | map(select((.user.login | canon_login) as $c | ($allow | index($c)) != null))
              | map(select(((.body // "") as $body | $noise | any(. as $prefix | $body | startswith($prefix))) | not))
              | map({ts: .created_at, kind: "comment", user: .user.login, state: null, body})
          ')

          reviews_total=$(jq 'length' <<<"$reviews")
          comments_total=$(jq 'length' <<<"$comments")
          reviews_capped=$(jq --argjson n "$MAX_ROUNDS" 'sort_by(.ts) | reverse | .[0:$n]' <<<"$reviews")
          comments_capped=$(jq --argjson n "$MAX_ROUNDS" 'sort_by(.ts) | reverse | .[0:$n]' <<<"$comments")
          reviews_capped_count=$(jq 'length' <<<"$reviews_capped")
          comments_capped_count=$(jq 'length' <<<"$comments_capped")

          combined=$(jq -n --argjson r "$reviews_capped" --argjson c "$comments_capped" '($r + $c) | sort_by(.ts) | reverse')
          capped_count=$(jq 'length' <<<"$combined")

          rendered=$(jq -r '
            .[] | (if .kind == "review" then "### Review (" + .state + ") by " + .user + " at " + .ts
                   else "### Comment by " + .user + " at " + .ts end)
              + "\n" + .body + "\n"
          ' <<<"$combined")

          note=""
          if [ "$reviews_capped_count" -lt "$reviews_total" ] || [ "$comments_capped_count" -lt "$comments_total" ]; then
            note="showing the $reviews_capped_count most recent of $reviews_total trusted review rounds and the $comments_capped_count most recent of $comments_total trusted comments; older entries omitted"
          fi

          if [ "${#rendered}" -gt "$MAX_CHARS" ]; then
            rendered="${rendered:0:$MAX_CHARS}
          [...truncated to fit a ${MAX_CHARS}-character cap...]"
            if [ -n "$note" ]; then
              note="$note; additionally truncated to fit a ${MAX_CHARS}-character cap"
            else
              note="truncated to fit a ${MAX_CHARS}-character cap; some older entries omitted"
            fi
          fi

          # automated-researcher#389 review: $rendered embeds review/comment BODIES verbatim, so a fixed
          # delimiter (previously "HISTORY_EOF") could be matched by a body line and used to inject extra
          # keys into $GITHUB_OUTPUT. A per-run random delimiter closes that off.
          delim="history_$(openssl rand -hex 20)"
          {
            echo "count=$capped_count"
            echo "note=$note"
            echo "rendered<<$delim"
            printf '%s\n' "$rendered"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Render review prompt
        id: render_prompt
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          BASE_SHA: ${{ steps.resolve_pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.resolve_pr.outputs.head_sha }}
          GUIDANCE: ${{ steps.guidance.outputs.guidance }}
          HISTORY_COUNT: ${{ steps.history.outputs.count }}
          HISTORY_NOTE: ${{ steps.history.outputs.note }}
          HISTORY_RENDERED: ${{ steps.history.outputs.rendered }}
        run: |
          set -euo pipefail

          if [ "$HISTORY_COUNT" -gt 0 ]; then
            note_suffix=""
            [ -n "$HISTORY_NOTE" ] && note_suffix=" ($HISTORY_NOTE)"
            history_section="Prior review rounds and the author's responses follow, most recent first$note_suffix.
          Treat an author response that fixed a finding (commit referenced) or disputed it with cited
          evidence as that finding's DISPOSITION. Do not re-raise a finding whose disposition you judge
          sound — adjudicate it, don't merely trust it: if a disposition is unsound, re-raise the finding
          and say precisely why the response fails. Findings not previously raised are judged fresh, as
          usual. Your P0/approve bar is unchanged.

          $HISTORY_RENDERED"
          else
            history_section="This is the first review of this PR; there is no prior review history to consider."
          fi

          prompt=$(cat <<PROMPT
          This is PR #$PR_NUMBER for $REPO.

          Review ONLY the changes introduced by this PR. From the checked-out repository root:
            git log --oneline $BASE_SHA...$HEAD_SHA
            git diff $BASE_SHA...$HEAD_SHA

          Apply exactly this severity convention (pulled from the PR's BASE branch, not this PR's own copy,
          so the PR cannot weaken the criteria it is judged by, even if this diff itself edits AGENTS.md):

          $GUIDANCE

          $history_section

          Be concise and specific: cite the exact file and evidence for each finding. Set "verdict" to
          "approve" only if you find zero P0 findings; otherwise "changes_requested". List every finding
          you have, P0 and P1 alike, in the findings array — non-blocking P1 findings are still recorded
          for a later human pass, never omitted.
          PROMPT
          )

          # automated-researcher#389 review: $prompt embeds prior review/comment bodies (via
          # $history_section), so a fixed delimiter (previously "PROMPT_EOF") could be matched by a body
          # line and used to inject extra keys into $GITHUB_OUTPUT. A per-run random delimiter closes that
          # off.
          delim="prompt_$(openssl rand -hex 20)"
          {
            echo "prompt<<$delim"
            printf '%s\n' "$prompt"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      - name: Run codex-action (review)
        id: run_codex
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # openai/codex-action v1.11
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          permission-profile: ":read-only"
          # Pinned deliberately (automated-researcher#394) so the reviewer model/effort are a conscious
          # choice, not whatever the codex-action/CLI pin defaults to. Bump here when moving to a newer
          # model or effort.
          model: gpt-5.6-sol
          effort: medium
          # The triggering actor is whoever opened/pushed the PR (pull_request) or whoever/whatever
          # dispatched this actuator (workflow_dispatch — automated-researcher#431), and openai/codex-action
          # denies bot actors by default (docs/security.md) even though this job's own `if:` already
          # restricts the run to an allowlisted identity. Passing the actual triggering actor here covers
          # both paths (a human actor is simply inert against this bot-only denylist).
          allow-bot-users: ${{ github.actor }}
          prompt: ${{ steps.render_prompt.outputs.prompt }}
          output-file: codex-review.json
          output-schema: |
            {
              "type": "object",
              "additionalProperties": false,
              "required": ["verdict", "findings"],
              "properties": {
                "verdict": { "enum": ["approve", "changes_requested"] },
                "findings": {
                  "type": "array",
                  "items": {
                    "type": "object",
                    "additionalProperties": false,
                    "required": ["severity", "summary", "evidence"],
                    "properties": {
                      "severity": { "enum": ["P0", "P1"] },
                      "summary": { "type": "string" },
                      "evidence": { "type": ["string", "null"] }
                    }
                  }
                }
              }
            }

      - name: Upload review verdict
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact v7.0.1
        with:
          name: codex-review-${{ steps.resolve_pr.outputs.pr_number }}
          path: codex-review.json
          retention-days: 1

  submit-verdict:
    name: submit-verdict
    # Fresh runner, no repo checkout, only the downloaded verdict artifact + gh api — never trusts whatever
    # host state the `review` job's runner ended up in after running the agent (same rationale as
    # implement-on-ready's enable-automerge job; from openai/codex-action's own security guidance).
    needs: review
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Download review verdict
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # actions/download-artifact v8.0.1
        with:
          name: codex-review-${{ needs.review.outputs.pr_number }}

      - name: Mint codex engineer App token
        id: mint_codex_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # actions/create-github-app-token v3.2.0
        with:
          app-id: ${{ secrets.CODEX_APP_ID }}
          private-key: ${{ secrets.CODEX_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Submit verdict as native review
        id: submit_review
        env:
          GH_TOKEN: ${{ steps.mint_codex_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.review.outputs.pr_number }}
          CAPTURED_HEAD_SHA: ${{ needs.review.outputs.head_sha }}
        run: |
          set -euo pipefail
          p0_count=$(jq '[.findings[] | select(.severity == "P0")] | length' codex-review.json)
          verdict=$(jq -r '.verdict // "changes_requested"' codex-review.json)

          # automated-researcher#502: consecutive-round count BEFORE this review is submitted -- the
          # trailing run of codex-engineer[bot] CHANGES_REQUESTED reviews, reset by any APPROVED. Computed
          # here (rather than re-querying after submission) so there is no eventual-consistency race
          # against the review this same step is about to post.
          prior_round=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate | jq -s '
            def canon_login: if startswith("app/") then (.[4:] + "[bot]") else . end;
            add // []
              | map(select((.user.login | canon_login) == "codex-engineer[bot]" and (.state == "APPROVED" or .state == "CHANGES_REQUESTED")))
              | sort_by(.submitted_at)
              | reduce .[] as $r (0; if $r.state == "CHANGES_REQUESTED" then . + 1 else 0 end)
          ')

          # code-review finding: approving must require BOTH zero P0 findings AND the model's own
          # `verdict` field saying "approve" -- deriving approval from p0_count alone let an
          # internally-inconsistent result (verdict="changes_requested" with an empty/malformed
          # findings array, or any verdict value other than the literal "approve") slip through as an
          # APPROVE. Any inconsistency between the two signals now fails closed to REQUEST_CHANGES,
          # never the other direction.
          if [ "$p0_count" -eq 0 ] && [ "$verdict" = "approve" ]; then
            event="APPROVE"
          else
            if [ "$p0_count" -eq 0 ] && [ "$verdict" != "approve" ]; then
              echo "::warning::codex-review.json has zero P0 findings but verdict='$verdict' (not 'approve') — requesting changes instead of trusting an inconsistent result"
            fi
            event="REQUEST_CHANGES"
          fi

          body=$(jq -r '
            "## Codex review\n\n" +
            (if (.findings | length) == 0 then "No findings.\n" else
              (.findings | map("- **" + .severity + "**: " + .summary +
                (if .evidence and (.evidence | length) > 0 then "\n  evidence: " + .evidence else "" end))
                | join("\n"))
            end)
          ' codex-review.json)

          # automated-researcher#502: this body embeds model-authored text (finding summaries/evidence)
          # verbatim, and a later step in this same job may post a deterministic @claude-code-engineer
          # dispatch mention to auto-trigger address-review.yml. Any occurrence of that same literal
          # substring inside the model's own prose must never itself be a live mention -- wrapping it in an
          # inline code span renders it visibly but GitHub does not parse mentions inside code spans, so
          # only the deterministic dispatch step below can ever carry a live mention.
          body="${body//@claude-code-engineer/\`@claude-code-engineer\`}"

          # Re-verify the head hasn't moved, as late as possible before the mutating POST below (guards a
          # `synchronize` race between review start and this submission): a stale review must never
          # approve new, unreviewed commits, and must never masquerade as a genuine review OF the new head
          # either -- codex-review.json's findings were produced against $CAPTURED_HEAD_SHA's diff, not
          # whatever the head has moved to since. automated-researcher#505 review round 2: this check
          # previously ran before the prior_round query and body rendering above, leaving exactly the
          # multi-second gap those steps take as an unguarded TOCTOU window; running it immediately before
          # the POST instead shrinks that window to the smallest achievable in a scripted step. Posting
          # stale findings as a REQUEST_CHANGES would (a) auto-dispatch address-review.yml against findings
          # for a diff the current head may not even contain, and (b) satisfy reconcile-prs.yml's
          # handle_mergeable "does this head already have a completed codex review" check, permanently
          # suppressing the very re-review that would otherwise fire for it. So: skip submitting any review
          # at all and stop -- the current head is correctly left with zero codex reviews against it, which
          # is exactly the state reconcile-prs.yml (#431) polls for and repairs by re-firing
          # review-on-pr.yml's workflow_dispatch actuator.
          current_head_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          if [ "$current_head_sha" != "$CAPTURED_HEAD_SHA" ]; then
            echo "::warning::PR head moved ($CAPTURED_HEAD_SHA -> $current_head_sha) during review — findings are for the stale head; skipping review submission so the reconciler re-fires a review against the current head instead of auto-dispatching against stale findings"
            {
              echo "event=STALE"
              echo "round=0"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
            -f "commit_id=$current_head_sha" \
            -f "event=$event" \
            -f "body=$body"

          round=0
          if [ "$event" = "REQUEST_CHANGES" ]; then
            round=$((prior_round + 1))
          fi
          {
            echo "event=$event"
            echo "round=$round"
          } >> "$GITHUB_OUTPUT"

      # automated-researcher#502: closes the pipeline's last human-in-the-loop step on the healthy path --
      # an interactive session previously had to hand-post the allowlisted @claude-code-engineer mention
      # after every CHANGES_REQUESTED round (address-review.yml's own allowlist already includes
      # codex-engineer[bot], which is the identity this job posts as). Ports agentic-engineering#56's
      # round-limit machinery (bounded consecutive-CHANGES_REQUESTED count -> needs-senior-engineer
      # escalation) so auto-dispatch can never spin an unbounded loop on a stuck disagreement.
      - name: Auto-dispatch addressing round on REQUEST_CHANGES
        if: steps.submit_review.outputs.event == 'REQUEST_CHANGES'
        env:
          GH_TOKEN: ${{ steps.mint_codex_token.outputs.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.review.outputs.pr_number }}
          ROUND: ${{ steps.submit_review.outputs.round }}
          CAPTURED_HEAD_SHA: ${{ needs.review.outputs.head_sha }}
        run: |
          set -euo pipefail

          LIMIT=3

          # Hard gate (issue #502 point 3): an escalation label already parked this PR with the
          # senior-engineer leg or a human -- the automated loop must never post another dispatch mention
          # on top of that, regardless of round count.
          labels=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '[.labels[].name] | join(",")')
          case ",$labels," in
            *,needs-senior-engineer,*) echo "PR #$PR_NUMBER: needs-senior-engineer already set; skipping auto-dispatch"; exit 0 ;;
            *,needs-human,*) echo "PR #$PR_NUMBER: needs-human already set; skipping auto-dispatch"; exit 0 ;;
          esac

          # automated-researcher#505 review round 2: the freshness check in the submission step above only
          # guards up to the moment of that POST -- a push landing in the gap between that POST succeeding
          # and this step starting (however small) would otherwise still dispatch an addressing round
          # against a head the review's findings no longer describe. Re-verify immediately before doing
          # anything mutating; a moved head here means a new `synchronize` run for the true current head
          # already owns (or will own) the dispatch decision, so skip rather than duplicate/contradict it.
          #
          # automated-researcher#505 review round 3: the labels gate now precedes this check, so no API
          # call sits between this fetch and the mutations below. The remaining fetch->mutation gap is
          # irreducible (GitHub's REST API has no atomic compare-and-mutate) and its outcomes are all
          # self-correcting or fail-closed: a mergeable push fires `synchronize`, whose run supersedes this
          # one via the `review-pr-N` cancel-in-progress group and re-decides dispatch at the current head;
          # a duplicate dispatch collapses in address-review.yml's per-PR `address-pr-N` cancel-in-progress
          # group into one round, run against the live branch (the implementor never checks out the
          # captured SHA); a stale escalation errs toward early senior-engineer attention. Accepted per
          # AGENTS.md's scale principle -- do not shrink this window further; see PR #505's round-3
          # senior-engineer adjudication.
          current_head_sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          if [ "$current_head_sha" != "$CAPTURED_HEAD_SHA" ]; then
            echo "PR #$PR_NUMBER: head moved ($CAPTURED_HEAD_SHA -> $current_head_sha) since the review was submitted; skipping auto-dispatch -- the synchronize run for the current head owns this decision"
            exit 0
          fi

          if [ "$ROUND" -ge "$LIMIT" ]; then
            echo "PR #$PR_NUMBER: $ROUND consecutive CHANGES_REQUESTED reviews (limit $LIMIT); escalating to needs-senior-engineer instead of auto-dispatching"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "Review loop: $ROUND consecutive CHANGES_REQUESTED rounds from the Codex reviewer with no approve in between (limit $LIMIT). Escalating to \`needs-senior-engineer\` for in-flight adjudication rather than continuing to auto-dispatch. See the review above for the latest findings."
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label needs-senior-engineer
          else
            echo "PR #$PR_NUMBER: dispatching addressing round $ROUND/$LIMIT"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "Review loop: auto-dispatch round $ROUND/$LIMIT. @claude-code-engineer the Codex review above requested changes -- please address the findings and push."
          fi
