name: checks

# Trusted required-status gate (automated-researcher#378 design review, Finding 3): this repo had no
# Actions CI at all before #378, so nothing ran .aar-ci/checks.sh as a trusted gate — the implement-on-ready
# workflow's auto-merge could otherwise merge a PR that never ran the deterministic check suite. This
# workflow only CALLS checks.sh (unmodified); it does not change what the checks do. Runs for every PR,
# human or agent authored — the same deterministic gate every PR should pass. No App token, no write
# permissions: ambient read-only GITHUB_TOKEN only. It does pass the existing ANTHROPIC_API_KEY repo
# secret (already used by implement-on-ready) through to .aar-ci/checks.sh, so fake_home_smoke.sh can run
# `claude plugin` headlessly on a GitHub runner, which has no local OAuth creds to seed (#396) — same
# accepted residual risk as the implementor run (AGENTS.md).

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: checks-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # automated-researcher#407: fake_home_smoke.sh (invoked by checks.sh below) shells out to the
      # `claude` CLI directly, but this runner never had it installed -- every invocation died at
      # command-not-found, silently swallowed by the smoke's own >/dev/null redirect. Same pin as
      # implement-on-ready.yml/address-review.yml (automated-researcher#387/#388): install the raw CLI
      # directly rather than trusting an auto-installing wrapper.
      - name: Install pinned Claude Code
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code@2.1.207

      - name: Run .aar-ci/checks.sh on changed paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          # A plain `mapfile -t arr < <(cmd)` does NOT propagate cmd's exit status through `set -e` (process
          # substitution failures are invisible to the parent shell's error trap) -- a failing `git diff`
          # would silently look like "zero changed paths" and this required gate would PASS closed instead
          # of failing. Capture through a checked command substitution instead.
          if ! diff_output=$(git diff --name-only "$BASE_SHA...$HEAD_SHA"); then
            echo "::error::git diff --name-only $BASE_SHA...$HEAD_SHA failed"
            exit 1
          fi
          if [ -z "$diff_output" ]; then
            echo "no changed paths detected; nothing to check"
            exit 0
          fi
          mapfile -t changed_paths <<< "$diff_output"

          # Overwrite the .aar-ci/ CI profile in place with its BASE-ref content before running it, so a
          # PR cannot weaken checks.sh (or a helper it directly shells out to, like fake_home_smoke.sh) in
          # the same diff and trivially pass its own required check. This covers the per-repo CI profile
          # ship-change's own SKILL.md names as the trust boundary (checks.sh + fake_home_smoke.sh +
          # checks_marketplace_smoke.sh) -- the actual working tree everything else runs against is still
          # the real PR-head content, only these three files are pinned to base. checks.sh also shells out
          # to dozens of PER-PLUGIN smoke scripts scattered under plugins/*/skills/*/scripts/ depending on
          # which paths changed; materializing every one of those from base too would silently break
          # legitimate PRs that add a new plugin's smoke test alongside the plugin itself (the base ref
          # wouldn't have that new smoke script yet), so that broader surface is left as an accepted
          # residual risk -- mitigated by the cross-family Codex review scrutinizing the exact same diff
          # under its P0 trust-boundary-violation criteria, not by this gate.
          for f in checks.sh fake_home_smoke.sh checks_marketplace_smoke.sh; do
            if git cat-file -e "$BASE_SHA:.aar-ci/$f" 2>/dev/null; then
              git show "$BASE_SHA:.aar-ci/$f" > ".aar-ci/$f"
              chmod +x ".aar-ci/$f"
            fi
          done
          bash .aar-ci/checks.sh "${changed_paths[@]}"
