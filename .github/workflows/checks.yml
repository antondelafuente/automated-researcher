name: checks

# Trusted required-status gate (automated-researcher#378 design review, Finding 3): this repo had no
# Actions CI at all before #378, so nothing ran .aar-ci/checks.sh as a trusted gate — the implement-on-ready
# workflow's auto-merge could otherwise merge a PR that never ran the deterministic check suite. This
# workflow only CALLS checks.sh (unmodified); it does not change what the checks do. Runs for every PR,
# human or agent authored — the same deterministic gate every PR should pass. No secrets, no App token, no
# write permissions: ambient read-only GITHUB_TOKEN only.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: checks-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run .aar-ci/checks.sh on changed paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # A plain `mapfile -t arr < <(cmd)` does NOT propagate cmd's exit status through `set -e` (process
          # substitution failures are invisible to the parent shell's error trap) -- a failing `git diff`
          # would silently look like "zero changed paths" and this required gate would PASS closed instead
          # of failing. Capture through a checked command substitution instead.
          if ! diff_output=$(git diff --name-only "$BASE_SHA...$HEAD_SHA"); then
            echo "::error::git diff --name-only $BASE_SHA...$HEAD_SHA failed"
            exit 1
          fi
          if [ -z "$diff_output" ]; then
            echo "no changed paths detected; nothing to check"
            exit 0
          fi
          mapfile -t changed_paths <<< "$diff_output"

          # Run the TRUSTED base-ref copy of checks.sh, not the PR head's own copy: otherwise a PR could
          # weaken checks.sh in the same diff and trivially pass its own required check. The script still
          # evaluates the actual PR-head working tree (we don't check out anything else) -- only the
          # validation LOGIC comes from the base commit, mirroring the same base-ref-materialization
          # pattern already used for the Codex review guidance in review-on-pr.yml.
          if ! git show "$BASE_SHA:.aar-ci/checks.sh" > /tmp/trusted_checks.sh 2>/dev/null; then
            echo "::error::could not materialize trusted .aar-ci/checks.sh from base $BASE_SHA"
            exit 1
          fi
          chmod +x /tmp/trusted_checks.sh
          bash /tmp/trusted_checks.sh "${changed_paths[@]}"
